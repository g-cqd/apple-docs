schema: apple-docs-performance-audit/v1
generated_at: 2026-04-17
tool: claude-code
model: claude-opus-4-6
scope:
  target: /Users/gc/Developer/ongoing/javascript/apple-docs
  surfaces: [pipeline, sources, storage, mcp, cli, commands, content, search, lib, web-server, web-build, web-worker, web-client]
  concern: maximize concurrency/parallelism; expand caching; decouple tightly-bound modules; improve robustness under partial failures
  baseline_metrics: unavailable  # no prior measurements captured
  constraint: report-only; no code modifications
note_on_verification: >
  Findings below were produced by four parallel exploration passes across disjoint surfaces, then
  the highest-impact claims (serial download/convert, sync adapter loop, highlight cache, gzipSync,
  flat-source seeding, rate-limiter isolation, semaphore queue bounds) were spot-checked against
  the cited file:line before synthesis.

executive_summary:
  headline: >
    The project has a good concurrency skeleton (shared Semaphore, pool(), rate limiter, prepared
    statements, lazy MCP imports, per-request memoization in the dev server), but its three busiest
    execution lanes — (1) the post-adapter pipeline stages in sync, (2) server-side rendering on
    every request, and (3) client-side search init — run *serially* in places where nothing
    structurally prevents parallelism or reuse. A handful of small, localized changes would remove
    most of the wall-clock cost.
  top_five_levers:
    - id: L1
      lever: Parallelize downloadMissing and convertAll with the existing pool() primitive
      expected_gain: 4x–20x wall-clock for resumed/partial syncs
    - id: L2
      lever: Add an LRU memoization layer around highlightCode(code, lang)
      expected_gain: 400ms–2.5s saved per large rendered page; dominant server-render cost
    - id: L3
      lever: Run adapter.discover() in parallel across adapters, then serialize crawl under the shared rate limiter
      expected_gain: 200–500ms per sync/update
    - id: L4
      lever: Replace N×getPageByPath() with one IN-list query in flat-source seeding
      expected_gain: 10x–100x for large flat sources (sample-code, swift-evolution)
    - id: L5
      lever: Move server gzip off the hot path (streaming or per-artifact cache) and add ETag / If-None-Match
      expected_gain: Smaller tail latency, fewer repeated compressions, 304 savings on hot reload
  structural_shifts:
    - Pipeline the sync stages (discover → download → convert → index-body) with a bounded in-memory queue instead of running them phase-by-phase.
    - Introduce per-host token buckets in the rate limiter and fetch-with-retry wrapper.
    - Adopt atomic write patterns (tmp+rename or single DB transaction wrapping related filesystem writes) in persist.js and build.js.
    - Add checkpoint/resume for long operations (index rebuild, consolidate phase 3, snapshot).

# ---------------------------------------------------------------------------
# Subsystem findings — concrete, with file:line citations
# ---------------------------------------------------------------------------
subsystem_findings:

  pipeline_and_sources:
    flow_map: |
      sync(): discoverRoots -> [for adapter in adapters: discover -> crawl|flat|snapshot] ->
              downloadMissing -> convertAll -> (optional) indexBodyIncremental

      Only the *inner* loops (pool over rootSlugs, pool over flat keys) run in parallel.
      The outer orchestration is strictly sequential even when phases are independent.
    findings:
      - id: P1
        location: src/commands/sync.js:47-84
        category: concurrency
        impact: medium
        effort: medium
        mechanism: for (const adapter of adapters) awaits discover()+crawl()+fetch() serially
        fix_direction: >
          Run adapter.discover() in parallel via Promise.all; keep crawl/fetch execution serialized
          per adapter under the shared Semaphore/RateLimiter so rate limits aren't violated.
      - id: P2
        location: src/pipeline/download.js:29-47
        category: concurrency
        impact: high
        effort: small
        mechanism: for (const page of pages) { await fetchDocPage(); await persistFetchedDocPage(); }
        fix_direction: >
          pool(pages, concurrency, handler) using the same Semaphore already used in crawl.
          Rate limiter handles per-request pacing; bounded concurrency avoids FD/memory spikes.
      - id: P3
        location: src/pipeline/convert.js:26-34
        category: concurrency
        impact: high
        effort: small
        mechanism: serial for..await over pages doing readJSON + renderPage + writeText
        fix_direction: >
          pool(pages, concurrency, convertPage). This is I/O-bound (fs read + fs write) with pure
          CPU in between — prime target for bounded parallelism (4–8).
      - id: P4
        location: src/commands/sync.js:180-184
        category: io-redundant
        impact: high
        effort: small
        mechanism: >
          Before each flat-source pool, a for loop calls db.getPageByPath(key) once per key
          (N single-row queries) just to know which keys already exist.
        fix_direction: >
          Single SELECT path FROM pages WHERE root_id = ? AND status = 'active' (or WHERE path IN (...))
          returning a Set in one call.
      - id: P5
        location: src/lib/flat-source-progress.js:4-6
        category: io-redundant
        impact: medium
        effort: small
        mechanism: >
          N separate db.setCrawlState() (each an INSERT OR REPLACE) after clearCrawlState. For
          sample-code / packages this can be tens of thousands of round trips.
        fix_direction: >
          Wrap in a single transaction (BEGIN/COMMIT) or use a multi-row INSERT via parameter arrays.
          Bun:sqlite supports transaction().
      - id: P6
        location: src/commands/sync.js:88-95
        category: pipelining
        impact: medium
        effort: large
        mechanism: >
          All adapters must finish before downloadMissing runs; downloadMissing must finish before
          convertAll; convertAll must finish before indexBodyIncremental. Each phase drains I/O it
          could overlap with the next.
        fix_direction: >
          Introduce an in-memory bounded queue between stages (or a light coroutine pattern) so that
          once a page is discovered, download can start; once downloaded, convert can start, without
          waiting for siblings. Backpressure via queue size.
      - id: P7
        location: src/pipeline/persist.js:13-54
        category: atomicity
        impact: medium
        effort: medium
        mechanism: >
          writeJSON → sha256 → db.upsert → writeText → db.markConverted performed as sequential
          non-atomic ops. A crash between writeJSON and the upsert leaves an orphan raw-json file;
          a crash between upsert and writeText marks a page "downloaded" but not convertible.
        fix_direction: >
          tmp+rename for both files; wrap DB mutations in a single immediate transaction; write the
          markdown first under tmp, update DB last, then rename files.
      - id: P8
        location: src/lib/fetch-with-retry.js (retry policy)
        category: robustness
        impact: medium
        effort: small
        mechanism: >
          Respects Retry-After per-call but there is no jitter; siblings completing Retry-After
          simultaneously will thunder herd. No per-host awareness.
        fix_direction: >
          Add Math.random()*jitter to backoff; broadcast Retry-After to a per-host RateLimiter.
      - id: P9
        location: src/lib/pool.js
        category: concurrency
        impact: low
        effort: small
        mechanism: No backpressure signal; callers can't throttle enqueueing based on queue depth.
        fix_direction: Expose queue depth / high-watermark API or provide a gated enqueue variant.
      - id: P10
        location: src/lib/semaphore.js:9
        category: concurrency
        impact: medium
        effort: small
        mechanism: _queue array is unbounded; sustained overload can grow it without limit.
        fix_direction: >
          Accept an optional maxWaiters; throw a typed BackpressureError when exceeded so callers
          can react rather than letting the process OOM silently.
      - id: P11
        location: src/lib/rate-limiter.js (single global bucket)
        category: robustness
        impact: medium
        effort: medium
        mechanism: >
          All hosts share one token bucket; a 429 from GitHub throttles fetches to Apple docs and
          vice versa. No jitter on release.
        fix_direction: >
          Map<hostname, RateLimiter> in the fetch-with-retry layer; extract new URL(url).hostname
          on entry and route to per-host bucket. Share a global ceiling if total-process budget
          matters.
      - id: P12
        location: src/commands/sync.js + src/commands/update.js (long runs)
        category: robustness
        impact: high
        effort: medium
        mechanism: >
          No per-phase checkpoint. A crash mid-sync leaves DB in a partially-crawled state. Existing
          crawl_state helps per-flat-key, but not for the overall phase transitions or consolidate.
        fix_direction: >
          Add sync_checkpoint(source_type, phase, last_processed_id) and check at the top of each
          phase; skip work already completed on re-run.
      - id: P13
        location: src/storage/database.js (prepared statements)
        category: caching
        impact: low
        effort: small
        mechanism: >
          Most statements are cached in instance fields (verified). However, some ad-hoc db.db.query(...)
          calls inside loops in consolidate.js and serve.js still recompile SQL per call.
        fix_direction: Promote those to pre-prepared statements on the DocsDatabase class.

  content_search_lib:
    findings:
      - id: C1
        location: src/content/render-html.js (calls at ~113, 126, 418, 660); src/content/highlight.js:26-37
        category: caching
        impact: high
        effort: small
        mechanism: >
          highlightCode(code, lang) has no output memoization. Shiki tokenization costs 100–500ms
          on non-trivial snippets; Apple docs repeat the same short examples across many pages.
        fix_direction: >
          Wrap highlightCode in an LRU keyed by a fast hash of (code+lang). ~1000 entries should
          cover hot snippets. Pure function — no invalidation concerns.
      - id: C2
        location: src/content/render-html.js (safeJson) + src/content/render-markdown.js:194-196
        category: caching
        impact: medium
        effort: small
        mechanism: JSON.parse(contentJson) on every render, even when the same section is re-rendered.
        fix_direction: WeakMap<string, parsed> or a small LRU keyed by the stable contentJson string.
      - id: C3
        location: src/content/parse-html.js (~152–168, 178–214, 323–352), parse-markdown.js:159,175,186
        category: hot-path-cpu
        impact: medium
        effort: small
        mechanism: RegExp literals constructed per call inside loops instead of lifted to module scope.
        fix_direction: Move pattern definitions to module top; compile once.
      - id: C4
        location: src/content/normalize.js (many JSON.stringify sites) and render-html.js (safeJson)
        category: decoupling
        impact: medium
        effort: large
        mechanism: >
          Inline ASTs are stringified at normalize time and parsed at render time. The pipeline
          throws away structure it could pass in-memory.
        fix_direction: >
          Introduce a ContentNode wrapper that carries both the parsed AST (used by render) and
          the stable JSON string (used at DB boundary). Serialize exactly once at persist.
      - id: C5
        location: src/search/ranking.js (multiple scoring passes)
        category: hot-path-cpu
        impact: medium
        effort: medium
        mechanism: Score multipliers applied in successive passes over result array.
        fix_direction: Fuse into a single pass computing all features per result, then ranking.
      - id: C6
        location: src/lib/logger.js
        category: robustness/perf
        impact: low
        effort: medium
        mechanism: Synchronous stderr write per log line; blocks event loop during bulk operations.
        fix_direction: Optional batched-async flush mode behind an env flag; keep sync as default.
      - id: C7
        location: src/apple/normalizer.js (normalizeIdentifier)
        category: caching
        impact: low
        effort: small
        mechanism: Called many times with same identifiers across docs.
        fix_direction: Module-level Map<raw, normalized>, bounded or per-sync-scope.

  mcp_cli_commands:
    cold_start:
      mcp: ~600ms–2.5s (DB open + Shiki init on first request with code)
      cli: ~150ms (DB open only; commands lazy-imported — good)
    findings:
      - id: M1
        location: src/mcp/server.js:282 (initHighlighter in handler setup)
        category: startup
        impact: high
        effort: medium
        mechanism: >
          Shiki grammars load ahead of first code-render need. MCP handshake completes faster if
          this is deferred.
        fix_direction: >
          Defer initHighlighter() to the first highlightCode() call (once-flag inside highlight.js).
          Web server can still eagerly init during startDevServer(). No behavior change.
      - id: M2
        location: src/commands/status.js:46 (db.getStats)
        category: concurrency
        impact: low
        effort: small
        mechanism: 6 count queries serially on one connection (SQLite WAL read-only).
        fix_direction: Combine into one SELECT using subqueries/UNION ALL.
      - id: M3
        location: src/commands/consolidate.js:88 (retry loop)
        category: concurrency
        impact: medium
        effort: small
        mechanism: for (const ... of resolvedPaths) awaits fetchDocPage + write + upsert serially.
        fix_direction: pool(resolvedPaths, concurrency, handler) with the shared rate limiter.
      - id: M4
        location: src/commands/consolidate.js:37,53 (phase 1+2)
        category: concurrency
        impact: low
        effort: small
        mechanism: serial DB deletes + serial readJSON for parent-lookup.
        fix_direction: >
          Batch deletes into a single transaction; use Promise.all on readJSON of parent paths
          with a bounded pool.
      - id: M5
        location: src/storage/profiles.js (getProfile)
        category: caching
        impact: low
        effort: small
        mechanism: Re-queries DB on every lookup.
        fix_direction: Cache in memory per-process (invalidate on profile change).
      - id: M6
        location: src/commands/index.js (rebuild path)
        category: robustness
        impact: medium
        effort: large
        mechanism: Full rebuild with no checkpointing; a crash forces starting over.
        fix_direction: Write progress marker per batch; on restart, resume from last marker.

  web_server_build_worker_client:
    findings:
      - id: W1
        location: src/web/serve.js:72-83
        category: hot-path-cpu
        impact: high
        effort: small
        mechanism: >
          Response body fully buffered via response.arrayBuffer() then gzipSync()'d on every
          compressible request. Sync gzip on the event loop + no cache; identical bodies are
          re-compressed on each request.
        fix_direction: >
          Either stream via a pipe (Bun's compression middleware) or cache compressed bodies in an
          LRU keyed by content hash for the static routes (/data/*, rendered pages keyed by path).
      - id: W2
        location: src/web/serve.js (route handlers /data/search/*, /docs/*)
        category: caching
        impact: high
        effort: small
        mechanism: >
          No ETag / If-None-Match support. Clients always revalidate by re-fetching the full body
          even when content is unchanged.
        fix_direction: >
          Compute ETag = sha256(body).slice(0,16); respond 304 on If-None-Match match. Applies
          especially to search-manifest.json (currently Cache-Control: no-cache).
      - id: W3
        location: src/web/serve.js:327-350 (ancestor + role heading lookups)
        category: caching
        impact: medium
        effort: small
        mechanism: >
          Per-request N+1 ancestor-title queries. build.js already has the pre-built cache pattern
          (lines 91-98) — dev server doesn't reuse it.
        fix_direction: >
          Build an ancestorTitleCache at server startup (or memoize per-key LRU on first hit).
          Invalidate on schema/DB change.
      - id: W4
        location: src/web/build.js:113 (pool concurrency=16 over batched documents)
        category: concurrency/caching
        impact: medium
        effort: medium
        mechanism: >
          Reasonable concurrency but no cross-document reuse of Shiki output or rendered HTML
          fragments. Same code snippets re-highlighted per page.
        fix_direction: >
          Share a content-hash → html LRU across the whole build run (pair with C1 in content).
          Consider raising concurrency for I/O-bound writes after profiling.
      - id: W5
        location: src/web/search-artifacts.js:73-125 (buildBodyShards)
        category: memory
        impact: medium
        effort: small
        mechanism: group_concat pulls all sections per doc before truncation to ~500 chars.
        fix_direction: Truncate per-row via SUBSTR/LIMIT in SQL before group_concat, or paginate.
      - id: W6
        location: src/web/worker/search-worker.js
        category: concurrency
        impact: medium
        effort: medium
        mechanism: >
          Single worker; recreated per page; manifest + indices rebuilt each time. No pool; no
          browser-side persistence across page loads.
        fix_direction: >
          Keep one persistent Worker per tab (or pool of 2–3); memoize manifest fetch in
          window._searchManifestCache with short TTL; consider IndexedDB for the raw corpora.
      - id: W7
        location: src/web/assets/collection-filters.js:213-239 (sort-by-kind)
        category: client-dom
        impact: high
        effort: medium
        mechanism: >
          Reassembles DOM sections by destroying and recreating them on every sort change.
          O(n) DOM mutations per toggle on large framework listings.
        fix_direction: >
          Encode kind as data-kind on <li>s and control grouping through CSS (order / flex). JS
          only toggles a class; CSS handles layout.
      - id: W8
        location: src/web/assets/tree-view.js:346-350
        category: client-dom
        impact: medium
        effort: small
        mechanism: Per-node details.open mutation forces layout per element.
        fix_direction: Batch under a single requestAnimationFrame; toggle via class, not property.
      - id: W9
        location: src/web/assets/search.js (keystroke search)
        category: client-concurrency
        impact: low
        effort: none
        mechanism: Already debounced 200ms with seqId guard — verified correct.
        fix_direction: No change.
      - id: W10
        location: src/web/build.js:36-74
        category: bloat
        impact: low
        effort: small
        mechanism: Per-file + bundled JS/CSS both emitted.
        fix_direction: Drop the duplicated per-file emission once bundled versions are in use.
      - id: W11
        location: src/web/build.js (overall write flow)
        category: atomicity
        impact: medium
        effort: medium
        mechanism: Pages written directly to outDir; partial builds leave inconsistent state.
        fix_direction: Build to outDir.tmp-<ts>, atomic rename at the end.

