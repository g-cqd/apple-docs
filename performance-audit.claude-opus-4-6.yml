# ---------------------------------------------------------------------------
# Quick wins (high impact × small effort)
# ---------------------------------------------------------------------------
quick_wins:
  - id: QW1
    title: pool() over downloadMissing pages
    target: src/pipeline/download.js:29-47
    change: Replace for..of+await with pool(pages, concurrency, ...) using an injected/shared Semaphore.
  - id: QW2
    title: pool() over convertAll pages
    target: src/pipeline/convert.js:26-34
    change: Same as above; convertPage is independent per page.
  - id: QW3
    title: LRU cache for highlightCode
    target: src/content/highlight.js:26-37
    change: >
      Add module-level LRU keyed by hash(code+lang) returning the HTML string; miss → call Shiki
      and store. Pure function, no invalidation.
  - id: QW4
    title: Defer Shiki initHighlighter() to first highlightCode call
    target: src/content/highlight.js:18-24 (+ src/mcp/server.js and src/web/serve.js:34 callers)
    change: >
      Move the once-flag init inside highlightCode. Web server can still eagerly init if desired,
      but the function becomes self-initializing, removing any caller duty.
  - id: QW5
    title: Single IN-query for flat existing keys
    target: src/commands/sync.js:180-184
    change: Replace N getPageByPath() with one SELECT path WHERE root_id = ? AND status = 'active'.
  - id: QW6
    title: Transactional seedFlatSourceProgress
    target: src/lib/flat-source-progress.js:1-7
    change: Wrap clearCrawlState + per-key setCrawlState in a single transaction().
  - id: QW7
    title: ETag / If-None-Match on /data/search/* + /docs/*
    target: src/web/serve.js (response construction)
    change: Compute sha256 of body; return 304 on match. Attach ETag to Response headers.
  - id: QW8
    title: Compressed-body LRU for static routes
    target: src/web/serve.js:72-83
    change: Cache (ETag → gzipBuffer) for compressible routes; skip re-gzip on repeat.
  - id: QW9
    title: Lift regex literals to module scope in parse-html.js / parse-markdown.js
    target: src/content/parse-html.js (~152–214, 323–352); src/content/parse-markdown.js:159/175/186
    change: Convert new RegExp(...) in loops to const PATTERN_X = /.../flags at top of module.
  - id: QW10
    title: Pool consolidate phase-3 retries
    target: src/commands/consolidate.js:88
    change: pool(resolvedPaths, concurrency, handler) using the shared RateLimiter.
  - id: QW11
    title: Retry-After jitter in fetch-with-retry
    target: src/lib/fetch-with-retry.js
    change: Add Math.random() * jitter to backoff delay calculation.
  - id: QW12
    title: Parallel adapter.discover()
    target: src/commands/sync.js:47-84 (and corresponding update.js)
    change: >
      Promise.all adapters.map(a => a.discover(adapterCtx)) first; then iterate for crawl/fetch to
      preserve ordered logging and rate-limiter semantics.

# ---------------------------------------------------------------------------
# Structural recommendations
# ---------------------------------------------------------------------------
structural_recommendations:
  - id: S1
    title: Pipeline fan-out/fan-in between sync stages
    description: >
      Replace the phase-by-phase serialization in sync() with a bounded queue architecture:
      discover pushes page references → download consumers fetch → convert consumers render →
      index consumers update DB. Backpressure via queue capacity; one shared Semaphore.
    benefits: Wall-clock improvement, better resource utilization, smoother rate-limit pacing.
    risk: Larger refactor; needs careful logging/progress semantics.
  - id: S2
    title: Per-host rate-limit + retry budget in fetch layer
    description: Map<hostname, RateLimiter> with shared ceiling; Retry-After broadcast per host.
    benefits: Isolates third-party outages; prevents one slow host blocking others.
    risk: Minimal; isolated change in fetch-with-retry + rate-limiter.
  - id: S3
    title: Atomic persist in pipeline + atomic publish in web build
    description: >
      persist.js: single transaction wrapping DB mutations; tmp+rename for raw-json and markdown
      files. build.js: write to outDir.tmp-<ts>, atomic rename to outDir at end; rollback on error.
    benefits: Crash-safety; safe-to-rerun.
    risk: Low; touch points are well-isolated.
  - id: S4
    title: Checkpoint/resume schema for long operations
    description: >
      sync_checkpoint(source_type, phase, last_processed_id, updated_at). Each phase checks and
      skips prior work. Applies to sync, update, consolidate phase-3, index rebuild.
    benefits: Hour-plus workloads survive crashes without re-fetching.
    risk: Schema migration; moderate scope.
  - id: S5
    title: Worker pool on the client + IndexedDB corpus cache
    description: >
      Persistent SearchWorker per tab (or pool of N); manifest memoized in globalThis; corpora
      stored in IndexedDB keyed by content hash with stale-while-revalidate.
    benefits: Near-zero search init cost after first page load.
    risk: Browser compatibility + schema evolution for the indexed corpus.
  - id: S6
    title: Introduce a thin "operations" service between command/mcp and lower layers
    description: >
      Today both the CLI (src/commands/*) and MCP (src/mcp/server.js) call into storage and
      pipeline directly. A service layer would host shared business logic (search, lookup, browse)
      and be unit-testable independently of its callers.
    benefits: De-duplication, clearer seams for caching and metrics.
    risk: Small; mostly relocation of existing helpers.
  - id: S7
    title: Content-AST carrier type (decouple parse → render)
    description: >
      Replace contentJson strings flowing through normalize/render with a ContentNode wrapper
      carrying parsed AST + stable-stringified form. Stringify exactly once, at the DB boundary.
    benefits: Reduces JSON.parse/stringify pressure; improves cacheability.
    risk: Larger internal change; needs schema versioning.

# ---------------------------------------------------------------------------
# Caching map — candidate layers with key/invalidation stories
# ---------------------------------------------------------------------------
caching_map:
  - name: highlight-lru
    scope: process
    key: hash(code + '\0' + lang)
    value: html string
    invalidation: never (pure)
    expected_hit_rate: 0.85
    note: Biggest single perf lever.
  - name: safeJson-lru
    scope: process
    key: contentJson (already a string)
    value: parsed object (frozen)
    invalidation: corpus update (bumped on sync)
    expected_hit_rate: 0.7
  - name: ancestor-titles
    scope: process (server/build)
    key: page key
    value: array of ancestor titles
    invalidation: rebuild on sync
    expected_hit_rate: 0.95
  - name: role-headings
    scope: process
    key: set of doc keys
    value: Map<key, roleHeading>
    invalidation: rebuild on sync
  - name: response-gzip
    scope: server
    key: route + sha256(body)
    value: gzipped Buffer
    invalidation: body change
    expected_hit_rate: route-dependent (0.6–0.95)
  - name: etag-index
    scope: server
    key: route + body-hash
    value: ETag header value
    invalidation: body change
  - name: http-conditional-get
    scope: fetch-with-retry
    key: URL
    value: {etag, lastModified, body?}
    invalidation: TTL + per-sync override
  - name: framework-synonyms
    scope: per-request today; promote to per-process
    key: framework slug
    value: synonyms list
    invalidation: corpus update
  - name: storage-profile
    scope: process
    key: profile name
    value: profile object
    invalidation: profile change
  - name: search-manifest-client
    scope: browser tab
    key: manifest URL
    value: parsed manifest
    invalidation: TTL (1h) + content-hash mismatch

# ---------------------------------------------------------------------------
# Concurrency map — current limits and suggested posture
# ---------------------------------------------------------------------------
concurrency_map:
  semaphore_primary:
    current: Semaphore(APPLE_DOCS_CONCURRENCY ?? 5), unbounded waiter queue
    suggested: keep 5 default; add maxWaiters and typed BackpressureError
  pool_primary:
    current: FIFO, no work-stealing, no backpressure signal
    suggested: expose queue-depth accessor; optional priority support
  rate_limiter:
    current: single token bucket; no jitter; no per-host isolation
    suggested: Map<host, RateLimiter>; jitter on backoff; Retry-After broadcast per host
  downloadMissing: currently sequential (1) → pool(concurrency)
  convertAll: currently sequential (1) → pool(4–8)
  adapter_loop: currently 1 → Promise.all for discover; serial crawl
  flat_source_pool: already pool(concurrency) — OK
  crawlRoot: already pool under Semaphore — OK
  web_static_build: pool=16 — re-benchmark with highlight-lru in place

# ---------------------------------------------------------------------------
# Robustness notes
# ---------------------------------------------------------------------------
robustness_notes:
  idempotency:
    sync_rerun: incremental-safe (etag + content-hash guards)
    update_rerun: incremental-safe
    consolidate_rerun: mostly safe (phases independent) but no snapshot of parent JSON during phase 2
    snapshot_command: verify overwrite semantics (not spot-checked)
    index_rebuild: non-resumable today
  atomicity:
    persist_py: non-atomic across raw-json + markdown + DB — needs tmp+rename + txn
    build_py: non-atomic — needs outDir.tmp pattern
  signal_handling: SIGINT/SIGTERM handled at top level; in-flight promises not awaited on shutdown
  failure_isolation:
    adapters: per-adapter try/catch in sync/update — good
    pages: per-page try/catch in pool handlers — good
    body_search: graceful degradation to tier 1–3 — good

# ---------------------------------------------------------------------------
# Risks, constraints, and non-goals
# ---------------------------------------------------------------------------
risks_and_constraints:
  - Rate-limit semantics must not regress when parallelizing adapter.discover() or pipeline stages.
  - Compression cache must invalidate correctly; ETag must be stable across responses, not per-request.
  - Atomic rename must handle cross-filesystem edge cases (fallback to copy+sync+rename).
  - Worker-side persistence must tolerate schema drift (version key).
non_goals:
  - This audit does not alter code.
  - This audit does not introduce new dependencies; all suggested caches can use a small in-repo LRU.

# ---------------------------------------------------------------------------
# Suggested follow-up (not performed here)
# ---------------------------------------------------------------------------
followups:
  - Collect baseline metrics (sync wall-clock, mean page render time, dev-server p95 latency)
    before any change to validate the gains claimed above.
  - Add a bench harness under test/ for highlightCode and render pipeline to lock in perf gains.
  - Introduce os-signpost / performance.mark around the pipeline stages for observability.
