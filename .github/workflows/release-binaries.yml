name: Build Binaries

on:
  release:
    types: [published]
  workflow_dispatch: {}

concurrency:
  group: release-binaries-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            name: apple-docs-macos-arm64
          - os: macos-14
            target: bun-darwin-x64
            name: apple-docs-macos-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            name: apple-docs-linux-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: ./.github/actions/setup

      - name: Compile binary
        run: bun build --compile --target=${{ matrix.target }} cli.js --outfile ${{ matrix.name }}

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Upload binary to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
          retention-days: 7
