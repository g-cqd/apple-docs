name: Scorecard supply-chain security

# A17: OpenSSF Scorecard reports on the project's supply-chain hygiene
# (branch protection, signed releases, dependency-update tooling, ...).
# Runs weekly + on push to main; results upload to GitHub's code-scanning
# UI and to OpenSSF's public dashboard via `publish_results`.

on:
  push:
    branches: [main]
  schedule:
    # Tuesdays 06:31 UTC.
    - cron: '31 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run analysis
        # `@v2` is not a resolvable ref on this action; the publisher
        # only ships specific minor tags. Pin the current minor SHA so
        # the workflow is reproducible and not subject to tag movement.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
