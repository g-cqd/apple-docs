name: CodeQL

# A17: GitHub-hosted SAST. Runs on every PR + push to main, plus a
# weekly cron so a newly-published advisory against an already-merged
# pattern surfaces without a code change. The matrix expands when we
# add languages CodeQL covers (e.g. Swift in src/resources/apple-symbols/).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — off-peak, off-hour to avoid coalescing with
    # weekday spikes.
    - cron: '17 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # JS/TS is interpreted — no build step (build-mode: none).
          - language: javascript-typescript
            os: ubuntu-latest
            build-mode: none
          # Swift needs a compiler pass; build the package manually under the
          # extractor (macos-26 carries the Xcode toolchain, as the native job).
          - language: swift
            os: macos-26
            build-mode: manual
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # `security-and-quality` is the recommended baseline; the
          # `security-extended` suite adds extra precision-3 queries.
          queries: security-and-quality
      - name: Install Swift 6.4 dev toolchain (no hosted macOS image ships 6.4)
        if: matrix.build-mode == 'manual'
        uses: g-cqd/ADBuildTools/.github/actions/setup-swift@v1
      - name: Build Swift (manual mode)
        if: matrix.build-mode == 'manual'
        working-directory: swift
        run: swift build
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: '/language:${{ matrix.language }}'
