name: CodeQL

# A17: GitHub-hosted SAST. Runs on every PR + push to main, plus a
# weekly cron so a newly-published advisory against an already-merged
# pattern surfaces without a code change. The matrix expands when we
# add languages CodeQL covers (e.g. Swift in src/resources/apple-symbols/).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — off-peak, off-hour to avoid coalescing with
    # weekday spikes.
    - cron: '17 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # JS/TS is interpreted — no build step (build-mode: none).
          - language: javascript-typescript
            os: ubuntu-latest
            build-mode: none
          # Swift needs a compiler pass; build the package manually under the
          # extractor (macos-26 carries the Xcode toolchain, as the native job).
          - language: swift
            os: macos-26
            build-mode: manual
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # `security-and-quality` is the recommended baseline; the
          # `security-extended` suite adds extra precision-3 queries.
          queries: security-and-quality
      - name: Build Swift (manual mode)
        if: matrix.build-mode == 'manual'
        working-directory: swift
        run: swift build
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:${{ matrix.language }}'
