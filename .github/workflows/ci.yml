name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

      - name: Lint (Biome)
        run: bun run lint

      - name: Lint web assets (Biome)
        run: bun run lint:web

      - name: Type check
        run: bun run typecheck

      - name: Unused code (Knip)
        run: bun run lint:unused

      - name: Code duplication (jscpd)
        run: |
          mkdir -p reports
          bun run lint:duplication

      - name: File-size budget
        run: bun run lint:size

      - name: Dependency audit
        run: bun audit

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-reports
          path: reports/
          retention-days: 30

  # Swift lint gate — the analogue of Biome for the Swift side, now via the
  # shared ADBuildTools Lint plugin (dev-gated behind APPLEDOCS_DEV so normal/CI
  # dylib builds never resolve it). The plugin lints against the canonical
  # `.swift-format` ADBuildTools owns; the drift step fails the build if this
  # repo's `.swift-format` diverges from that canonical copy.
  swift-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install Swift (swiftly)
        uses: vapor/swiftly-action@bedb227456c5f495afbef80baebee17a8a02cef4 # v0.2.1
        with:
          toolchain: '6.3.2' # keep in sync with swift/.swift-version
      - name: Swift lint (ADBuildTools plugin, canonical .swift-format)
        working-directory: swift
        run: APPLEDOCS_DEV=1 swift package --disable-sandbox lint
      - name: Canonical .swift-format drift check
        working-directory: swift
        # The Lint plugin resolves ADBuildTools, which vendors the canonical
        # config under .build/checkouts/ADBuildTools. Fail if our copy drifted.
        run: |
          CANON="$(find .build/checkouts/ADBuildTools -maxdepth 2 -name '.swift-format' -print -quit)"
          if [ -z "$CANON" ]; then echo "canonical .swift-format not found in ADBuildTools checkout" >&2; exit 1; fi
          diff -u "$CANON" .swift-format

  # Sanitizer lane for the heavy Unsafe/FFI + concurrency surface (ASan catches
  # the C-boundary OOB/overflow class; TSan any latent data race). Serial so a
  # finding maps to one test. Informational (continue-on-error) until the first
  # clean run is confirmed, then flip to a hard gate.
  swift-sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, thread]
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Ensure libzstd (archive module runtime dep)
        run: brew list zstd >/dev/null 2>&1 || brew install zstd
      - name: swift test (--sanitize=${{ matrix.sanitizer }})
        working-directory: swift
        run: swift test --sanitize=${{ matrix.sanitizer }} --no-parallel

  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-26 carries the latest CoreGlyphs / CoreGlyphsPrivate bundles
        # so private-symbol code paths (renderSfSymbol, prerenderSfSymbols,
        # symbol-pdf-to-svg) get exercised against the same Swift toolchain
        # the snapshot workflow uses.
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    env:
      APPLE_DOCS_NO_GIT_AUTH: '1'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

      - name: Run tests with coverage
        run: bun test --coverage --isolate

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 30

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  # Builds libAppleDocsCore on every bridge target and proves JS↔Swift
  # parity through the staged artifact. Runs unconditionally — parity
  # involves both sides, so a fusion.js-only change must pass it too —
  # and public-repo runners (incl. ubuntu-24.04-arm) are free.
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # macOS uses the image's Xcode toolchain (ci.md allows it when it
      # satisfies the pin); the swiftly action's prerequisite script can't
      # drive a package manager on macos-26 images.
      - name: Install Swift (swiftly)
        if: runner.os == 'Linux'
        uses: vapor/swiftly-action@bedb227456c5f495afbef80baebee17a8a02cef4 # v0.2.1
        with:
          toolchain: '6.3.2' # keep in sync with swift/.swift-version

      - name: Cache SwiftPM build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.swiftpm
            swift/.build
          key: swift-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('swift/Package.swift', 'swift/.swift-version') }}

      - name: Build libAppleDocsCore (release)
        working-directory: swift
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            # $ORIGIN rpath: the staged bundle resolves the Swift runtime
            # .so set from its own directory (D-P0-1).
            swift build -c release -Xlinker -rpath -Xlinker '$ORIGIN'
          else
            swift build -c release
          fi

      - name: Ensure libzstd (archive module runtime dep)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ldconfig -p | grep -q libzstd.so.1 || sudo apt-get install -y libzstd1
          else
            brew list zstd >/dev/null 2>&1 || brew install zstd
          fi

      # The storage module (RFC 0001 P5) dlopens libsqlite3 at runtime — both
      # `swift test` (ADStorageTests) and the JS parity test need it. Linux
      # runners need libsqlite3-0 (ships SQLITE_ENABLE_FTS5); macOS has it.
      - name: Ensure libsqlite3 (storage module runtime dep)
        if: runner.os == 'Linux'
        run: ldconfig -p | grep -q libsqlite3.so.0 || sudo apt-get install -y libsqlite3-0

      # Linux only: the HarfBuzz shaper (RFC 0003 phase 4) dlopens
      # libharfbuzz at runtime, and shaper-parity.test.js compares it to
      # hb-view (rasterised via rsvg-convert + ImageMagick) on a DejaVu test
      # font. darwin uses CoreText, so the shaper + its parity test skip there.
      - name: Ensure HarfBuzz + render tooling (Linux shaper + parity)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libharfbuzz0b libharfbuzz-bin librsvg2-bin imagemagick fonts-dejavu-core

      - name: Swift tests
        working-directory: swift
        run: swift test --enable-code-coverage

      # Export the Swift test coverage (linux leg only) and merge it into the
      # same Codecov project as the JS lcov. Non-fatal: a toolchain that can't
      # locate llvm-cov must not fail the parity job.
      - name: Export Swift coverage (lcov)
        if: matrix.target == 'linux-x64'
        working-directory: swift
        run: |
          bin="$(swift build --show-bin-path)"
          testbin="$(find "$bin" -name '*PackageTests.xctest' | head -1)"
          llvm-cov export -format=lcov \
            -instr-profile "$bin/codecov/default.profdata" "$testbin" \
            -ignore-filename-regex='\.build|Tests|checkouts' > swift-coverage.lcov || true

      - name: Upload Swift coverage to Codecov
        if: matrix.target == 'linux-x64'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: swift/swift-coverage.lcov
          fail_ci_if_error: false
          flags: swift
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Stage native artifact
        run: |
          dest="dist/native/${{ matrix.target }}"
          mkdir -p "$dest"
          if [ "${{ runner.os }}" = "Linux" ]; then
            cp swift/.build/release/libAppleDocsCore.so "$dest/"
            # Bundle the Swift runtime libs from ldd's actual resolved
            # paths (the swiftly toolchain location varies by install).
            for dep in $(ldd "$dest/libAppleDocsCore.so" | awk '$1 ~ /^lib(swift|Foundation|dispatch|BlocksRuntime|_)/ {print $3}'); do
              cp "$dep" "$dest/"
            done
            strip --strip-unneeded "$dest"/*.so
          else
            cp swift/.build/release/libAppleDocsCore.dylib "$dest/"
          fi
          ls -lh "$dest"

      - uses: ./.github/actions/setup

      - name: JS↔Swift parity against the staged artifact
        env:
          APPLE_DOCS_NATIVE: fusion,archive,embed,content,render
        run: |
          ext=so
          [ "${{ runner.os }}" = "macOS" ] && ext=dylib
          export APPLE_DOCS_NATIVE_LIB="$PWD/dist/native/${{ matrix.target }}/libAppleDocsCore.$ext"
          bun test test/unit/native/ test/unit/search/fusion-parity.test.js test/unit/search/fusion.test.js \
            test/unit/lib/archive-native-parity.test.js test/unit/lib/archive-zstd.test.js \
            test/unit/content/content-native-parity.test.js \
            test/integration/storage-wal-contention.test.js

      - name: zstd self-test of a native-built archive
        env:
          APPLE_DOCS_NATIVE: archive
        run: |
          ext=so
          [ "${{ runner.os }}" = "macOS" ] && ext=dylib
          export APPLE_DOCS_NATIVE_LIB="$PWD/dist/native/${{ matrix.target }}/libAppleDocsCore.$ext"
          mkdir -p /tmp/ad-selftest/tree && printf 'self-test' > /tmp/ad-selftest/tree/a.txt
          bun -e "
            import { _forceImpl, createTarZstArchive } from './src/lib/archive-native.js'
            _forceImpl('native')
            const r = await createTarZstArchive({ sourceDir: '/tmp/ad-selftest/tree', outputPath: '/tmp/ad-selftest/out.tar.zst' })
            if (r.fileCount !== 1) throw new Error('unexpected member count')
          "
          zstd -t /tmp/ad-selftest/out.tar.zst

  # Mutation testing was removed in June 2026: the nightly Stryker run
  # had not produced a single green report in over two weeks (ten ~1-min
  # config failures, then 5h-timeout kills once it started mutating —
  # the full-corpus pass simply doesn't fit any sane runner budget),
  # while burning ~5 runner-hours a day. Correctness is gated by the
  # unit + coverage runs above; if mutation ever returns it needs a
  # sharded or diff-scoped design, not a bigger timeout.
