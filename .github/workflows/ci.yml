name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Lint (Biome)
        run: bun run lint

      - name: Lint web assets (Biome)
        run: bun run lint:web

      - name: Type check
        run: bun run typecheck

      - name: Unused code (Knip)
        run: bun run lint:unused

      - name: Code duplication (jscpd)
        run: |
          mkdir -p reports
          bun run lint:duplication

      - name: File-size budget
        run: bun run lint:size

      - name: Dependency audit
        run: bun audit

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports
          path: reports/
          retention-days: 30

  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-26 carries the latest CoreGlyphs / CoreGlyphsPrivate bundles
        # so private-symbol code paths (renderSfSymbol, prerenderSfSymbols,
        # symbol-pdf-to-svg) get exercised against the same Swift toolchain
        # the snapshot workflow uses.
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}
    env:
      APPLE_DOCS_NO_GIT_AUTH: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run tests with coverage
        run: bun test --coverage --isolate

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 30

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  # Mutation testing lives in .github/workflows/mutation.yml as a
  # separate workflow (nightly cron + workflow_dispatch + opt-in via
  # a `run-mutation` PR label). Rationale: a comment-scrub commit
  # touching 50+ source files blows out the Stryker incremental
  # baseline and projects multi-hour wall-clock — well past any
  # reasonable per-push CI timeout. Mutation is correctness
  # reporting, not a merge gate, so it deserves its own cadence.
