name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Lint (Biome)
        run: bun run lint

      - name: Lint web assets (Biome)
        run: bun run lint:web

      - name: Type check
        run: bun run typecheck

      - name: Unused code (Knip)
        run: bun run lint:unused

      - name: Code duplication (jscpd)
        run: |
          mkdir -p reports
          bun run lint:duplication

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-reports
          path: reports/
          retention-days: 30

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      APPLE_DOCS_NO_GIT_AUTH: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Run tests with coverage
        run: bun test --coverage --isolate

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 30

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  mutation:
    runs-on: ubuntu-latest
    env:
      APPLE_DOCS_NO_GIT_AUTH: '1'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Restore Stryker incremental baseline
        uses: actions/cache@v5
        with:
          path: |
            .stryker-tmp
            reports/stryker-incremental.json
          key: stryker-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            stryker-${{ github.ref }}-
            stryker-refs/heads/main-

      - name: Mutation testing (changed files)
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          CHANGED=$(git diff --name-only "$BASE"...HEAD -- 'src/**/*.js' | paste -sd, -)
          if [ -n "$CHANGED" ]; then
            echo "Mutating: $CHANGED"
            bunx stryker run --mutate "$CHANGED" --incremental
          else
            echo "No src/ JS files changed since $BASE — skipping mutation testing"
          fi

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/stryker/
          retention-days: 30
          if-no-files-found: ignore
