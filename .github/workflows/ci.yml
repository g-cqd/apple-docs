name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Lint web assets (Biome)
        run: bun run lint:web

      - name: Type check
        run: bun run typecheck

      - name: Unused code (Knip)
        run: bun run lint:unused

      - name: Code duplication (jscpd)
        run: |
          mkdir -p reports
          bun run lint:duplication

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/
          retention-days: 30

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun test --coverage

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/
          retention-days: 30

      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile

      - name: Mutation testing (changed files)
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- 'src/**/*.js' | tr '\n' ',')
          if [ -n "$CHANGED" ]; then
            npx stryker run --mutate "$CHANGED" --incremental
          else
            echo "No src/ JS files changed — skipping mutation testing"
          fi

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/stryker/
          retention-days: 30
