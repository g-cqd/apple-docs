name: Build Snapshots

on:
  schedule:
    - cron: '0 6 * * 0' # Sundays at 06:00 UTC
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tiers to build (comma-separated or "all")'
        default: 'all'
        type: string

concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-snapshot:
    # macOS 26 gives us the latest CoreGlyphs / CoreGlyphsPrivate bundles so
    # the full-tier snapshot ships every SF Symbol Apple has shipped to date.
    # The Swift toolchain on macOS 26 also exposes `vectorGlyph.drawInContext:`
    # which our private-API SVG renderer depends on (see src/resources/
    # symbol-pdf-to-svg.js). Older runners would silently produce a smaller
    # symbol catalog.
    runs-on: macos-26
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Set data directory
        run: echo "APPLE_DOCS_HOME=${{ runner.temp }}/apple-docs" >> "$GITHUB_ENV"

      # Single command refreshes the entire corpus end-to-end:
      # HEAD-check existing pages, crawl new ones, convert, index, sync
      # Apple typography (DMG download + extract) and SF Symbols (public +
      # private), pre-render every symbol to SVG, and run schema migrations
      # / failure cleanup / JSON minify. Idempotent and resumable.
      #
      # APPLE_DOCS_DOWNLOAD_FONTS=1 enables Apple's font DMG download +
      # extraction so the snapshot ships every font Apple distributes,
      # including those not pre-installed on the macos-26 runner. Local
      # `apple-docs sync` runs leave this off — most workstations already
      # have SF Pro / Compact / Mono installed and the DMG fetch is slow.
      - name: Sync corpus
        env:
          APPLE_DOCS_DOWNLOAD_FONTS: '1'
        run: bun run cli.js sync --full
        timeout-minutes: 120

      - name: Determine tag
        id: tag
        run: echo "tag=snapshot-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Resolve tiers
        id: tiers
        run: |
          TIERS="${{ inputs.tiers || 'all' }}"
          {
            echo "build_lite=$( [[ "$TIERS" == "all" || "$TIERS" == *lite* ]] && echo true || echo false )"
            echo "build_standard=$( [[ "$TIERS" == "all" || "$TIERS" == *standard* ]] && echo true || echo false )"
            echo "build_full=$( [[ "$TIERS" == "all" || "$TIERS" == *full* ]] && echo true || echo false )"
          } >> "$GITHUB_OUTPUT"

      - name: Build lite snapshot
        if: steps.tiers.outputs.build_lite == 'true'
        run: bun run scripts/build-snapshot.js --tier lite --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Build standard snapshot
        if: steps.tiers.outputs.build_standard == 'true'
        run: bun run scripts/build-snapshot.js --tier standard --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Build full snapshot
        if: steps.tiers.outputs.build_full == 'true'
        run: bun run scripts/build-snapshot.js --tier full --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Corpus stats
        run: bun run cli.js status --json > dist/status.json

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Snapshot (${{ steps.tag.outputs.tag }})'
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.manifest.json
            dist/status.json
          draft: false
          prerelease: false
          body: |
            ${{ github.event_name == 'schedule' && 'Scheduled snapshot build.' || 'Manual snapshot build.' }}

            **Tiers:**
            - `lite` — Metadata + FTS5 title/abstract index
            - `standard` — + trigram index + body FTS5 + normalized sections
            - `full` — Standard + raw JSON + Markdown + every Apple font + every pre-rendered SF Symbol SVG

            **Install:**
            ```bash
            apple-docs setup --tier full
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
