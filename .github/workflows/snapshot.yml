name: Build Snapshots

on:
  schedule:
    - cron: '0 6 * * 0' # Sundays at 06:00 UTC
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tiers to build (comma-separated or "all")'
        default: 'all'
        type: string

concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-snapshot:
    runs-on: macos-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Set data directory
        run: echo "APPLE_DOCS_HOME=${{ runner.temp }}/apple-docs" >> "$GITHUB_ENV"

      - name: Sync corpus
        run: bun run cli.js sync --concurrency 500 --rate 500 --full --parallel 20 --retry-failed --index
        timeout-minutes: 30

      - name: Determine tag
        id: tag
        run: echo "tag=snapshot-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Resolve tiers
        id: tiers
        run: |
          TIERS="${{ inputs.tiers || 'all' }}"
          {
            echo "build_lite=$( [[ "$TIERS" == "all" || "$TIERS" == *lite* ]] && echo true || echo false )"
            echo "build_standard=$( [[ "$TIERS" == "all" || "$TIERS" == *standard* ]] && echo true || echo false )"
            echo "build_full=$( [[ "$TIERS" == "all" || "$TIERS" == *full* ]] && echo true || echo false )"
          } >> "$GITHUB_OUTPUT"

      - name: Build lite snapshot
        if: steps.tiers.outputs.build_lite == 'true'
        run: bun run cli.js snapshot build --tier lite --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Build standard snapshot
        if: steps.tiers.outputs.build_standard == 'true'
        run: bun run cli.js snapshot build --tier standard --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Build full snapshot
        if: steps.tiers.outputs.build_full == 'true'
        run: bun run cli.js snapshot build --tier full --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Corpus stats
        run: bun run cli.js status --json > dist/status.json

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Snapshot (${{ steps.tag.outputs.tag }})'
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.manifest.json
            dist/status.json
          draft: false
          prerelease: false
          body: |
            ${{ github.event_name == 'schedule' && 'Scheduled snapshot build.' || 'Manual snapshot build.' }}

            **Tiers:**
            - `lite` — Metadata + FTS5 title/abstract index
            - `standard` — + trigram index + body FTS5 + normalized sections
            - `full` — Standard + raw JSON + Markdown files

            **Install:**
            ```bash
            apple-docs setup --tier full
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
