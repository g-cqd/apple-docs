name: Build Snapshots

on:
  schedule:
    - cron: '0 6 * * 0' # Sundays at 06:00 UTC
  workflow_dispatch:
    inputs:
      tiers:
        description: 'Tiers to build (comma-separated or "all")'
        default: 'all'
        type: string

concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-snapshot:
    # macOS 26 gives us the latest CoreGlyphs / CoreGlyphsPrivate bundles so
    # the full-tier snapshot ships every SF Symbol Apple has shipped to date.
    # The Swift toolchain on macOS 26 also exposes `vectorGlyph.drawInContext:`
    # which our private-API SVG renderer depends on (see src/resources/
    # symbol-pdf-to-svg.js). Older runners would silently produce a smaller
    # symbol catalog.
    runs-on: macos-26
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Set data directory
        run: echo "APPLE_DOCS_HOME=${{ runner.temp }}/apple-docs" >> "$GITHUB_ENV"

      - name: Sync corpus
        run: bun run cli.js sync --concurrency 500 --rate 500 --full --parallel 20 --retry-failed --index
        timeout-minutes: 30

      # Apple typography assets — DMG/PKG download + extraction. ~30s per
      # family on a warm runner, dominated by `hdiutil attach` latency.
      - name: Sync Apple fonts (download + extract)
        run: bun run cli.js fonts sync --download
        timeout-minutes: 30

      # SF Symbols catalog (public + private) from the system bundles. The
      # plist-driven sync is fast — ~3s for ~10k symbols.
      - name: Sync SF Symbols catalog
        run: bun run cli.js symbols sync

      # Pre-render every indexed symbol to a theme-neutral SVG via our
      # in-process PDF parser. This is the work the snapshot is meant to
      # save end users from running themselves — bake it into the archive.
      - name: Pre-render SF Symbols
        run: bun run cli.js symbols render --concurrency 8
        timeout-minutes: 30

      - name: Determine tag
        id: tag
        run: echo "tag=snapshot-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Resolve tiers
        id: tiers
        run: |
          TIERS="${{ inputs.tiers || 'all' }}"
          {
            echo "build_lite=$( [[ "$TIERS" == "all" || "$TIERS" == *lite* ]] && echo true || echo false )"
            echo "build_standard=$( [[ "$TIERS" == "all" || "$TIERS" == *standard* ]] && echo true || echo false )"
            echo "build_full=$( [[ "$TIERS" == "all" || "$TIERS" == *full* ]] && echo true || echo false )"
          } >> "$GITHUB_OUTPUT"

      - name: Build lite snapshot
        if: steps.tiers.outputs.build_lite == 'true'
        run: bun run cli.js snapshot build --tier lite --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Build standard snapshot
        if: steps.tiers.outputs.build_standard == 'true'
        run: bun run cli.js snapshot build --tier standard --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Build full snapshot
        if: steps.tiers.outputs.build_full == 'true'
        run: bun run cli.js snapshot build --tier full --out dist/ --tag ${{ steps.tag.outputs.tag }}

      - name: Corpus stats
        run: bun run cli.js status --json > dist/status.json

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Snapshot (${{ steps.tag.outputs.tag }})'
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.manifest.json
            dist/status.json
          draft: false
          prerelease: false
          body: |
            ${{ github.event_name == 'schedule' && 'Scheduled snapshot build.' || 'Manual snapshot build.' }}

            **Tiers:**
            - `lite` — Metadata + FTS5 title/abstract index
            - `standard` — + trigram index + body FTS5 + normalized sections
            - `full` — Standard + raw JSON + Markdown + every Apple font + every pre-rendered SF Symbol SVG

            **Install:**
            ```bash
            apple-docs setup --tier full
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
