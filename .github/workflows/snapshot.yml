name: Build Snapshots

on:
  schedule:
    - cron: '0 6 * * 0' # Sundays at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-snapshot:
    # macOS 26 gives us the latest CoreGlyphs / CoreGlyphsPrivate bundles
    # so the snapshot ships every SF Symbol Apple has shipped to date.
    # The Swift toolchain on macOS 26 also exposes `vectorGlyph.drawInContext:`
    # which our private-API SVG renderer depends on (see src/resources/
    # symbol-pdf-to-svg.js). Older runners would silently produce a
    # smaller symbol catalog.
    runs-on: macos-26
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup

      # Archive pipeline: snapshots ship as `.tar.gz` with `gzip -9`
      # (max DEFLATE). LZMA2 / .7z used to be the format but May 2026
      # corpus growth pushed it past the 3-core M1 runner's wallclock
      # budget — see docs/spikes/archive-format.md. Stock `tar` + `gzip`
      # are pre-installed on macos-26, so no install step is needed.
      - name: Set data directory
        run: echo "APPLE_DOCS_HOME=${{ runner.temp }}/apple-docs" >> "$GITHUB_ENV"

      # Single command refreshes the entire corpus end-to-end:
      # HEAD-check existing pages, crawl new ones, convert, index, sync
      # Apple typography (DMG download + extract) and SF Symbols (public +
      # private), pre-render every symbol to SVG, and run schema migrations
      # / failure cleanup / JSON minify. Idempotent and resumable.
      #
      # APPLE_DOCS_DOWNLOAD_FONTS=1 enables Apple's font DMG download +
      # extraction so the snapshot ships every font Apple distributes,
      # including those not pre-installed on the macos-26 runner. Local
      # `apple-docs sync` runs leave this off — most workstations already
      # have SF Pro / Compact / Mono installed and the DMG fetch is slow.
      - name: Sync corpus
        env:
          APPLE_DOCS_DOWNLOAD_FONTS: '1'
        run: bun run cli.js sync --full
        timeout-minutes: 120

      - name: Determine tag
        id: tag
        run: echo "tag=snapshot-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Build all archives (full snapshot + combined symbols + per-family
      # fonts + fonts-all). The orchestrator also emits a unified
      # status.json with sha256 + size + url for every artefact.
      #
      # APPLE_DOCS_ALLOW_REMOTE_MODELS=1 lets the embeddings step (run inside
      # build-snapshot.js) fetch the q8 ONNX query model once into
      # $APPLE_DOCS_HOME/resources/models so it ships in the snapshot for
      # offline semantic search. The determinism re-build below intentionally
      # omits this — the model is already present locally by then, so the
      # second build reuses it (no re-download) and the archives stay
      # bit-identical. The optional @huggingface/transformers dependency is
      # already installed by the frozen `bun install` (it's in bun.lock).
      - name: Build archives
        env:
          APPLE_DOCS_ALLOW_REMOTE_MODELS: '1'
        run: |
          bun run cli.js status --json > dist-status-base.json
          bun run scripts/build-snapshot.js \
            --out dist/ \
            --tag ${{ steps.tag.outputs.tag }} \
            --status-in dist-status-base.json \
            --status-out dist/status.json \
            --release-url-base https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}

      # Determinism gate: re-build the snapshot archive into a sibling dir
      # and diff sha256s. The orchestrator already wrote the canonical
      # outputs into dist/; we re-run with --out dist-check/ and compare.
      # A mismatch fails the workflow before we publish anything.
      #
      # Runs on every trigger (schedule + workflow_dispatch). Doubles the
      # workflow wallclock (~47 min → ~94 min on a 4-core macos-26
      # runner), but matches the schedule-run guarantees on manual
      # dispatches too — operators who ship a code change to the snapshot
      # pipeline get end-to-end determinism verification before publish
      # instead of waiting for the next Sunday cron.
      - name: Verify determinism
        run: |
          bun run scripts/build-snapshot.js \
            --out dist-check/ \
            --tag ${{ steps.tag.outputs.tag }} \
            --status-out dist-check/status.json \
            >/dev/null
          set -e
          # Compare every .tar.gz by sha256. The .sha256 sidecars themselves
          # are derived from the archive bytes; if archives match, sidecars
          # match by construction.
          fail=0
          for f in dist/*.tar.gz; do
            name=$(basename "$f")
            a=$(shasum -a 256 "$f" | awk '{print $1}')
            b=$(shasum -a 256 "dist-check/$name" | awk '{print $1}')
            if [ "$a" != "$b" ]; then
              echo "MISMATCH $name: $a vs $b" >&2
              fail=1
            fi
          done
          rm -rf dist-check
          if [ "$fail" != "0" ]; then exit 1; fi

      # Generate the release-notes body via a dedicated script. The
      # previous in-step `bun run --silent <<EOF ... EOF` was a stdin
      # invocation `bun run` does not support; it printed bun's CLI
      # help into release-body.md instead of the rendered markdown.
      - name: Compose release notes
        env:
          RELEASE_PROLOGUE: ${{ github.event_name == 'schedule' && 'Scheduled snapshot build.' || 'Manual snapshot build.' }}
          APPLE_DOCS_STATUS: dist/status.json
        run: |
          bun scripts/render-release-notes.js > dist/release-body.md

      # Release ships only the full snapshot archive + its sidecar + the
      # manifest. The build pipeline still produces the combined fonts
      # archive (`fonts-all-<tag>.tar.gz`) and the symbols archive
      # (`symbols-<tag>.tar.gz`) so a running instance can expose them at
      # runtime, but they are intentionally NOT attached to the release —
      # the full snapshot tarball already contains every resource they
      # bundle, so attaching them would duplicate ~1.5x the bytes for no
      # consumer benefit.
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Snapshot (${{ steps.tag.outputs.tag }})'
          body_path: dist/release-body.md
          files: |
            dist/apple-docs-full-${{ steps.tag.outputs.tag }}.tar.gz
            dist/apple-docs-full-${{ steps.tag.outputs.tag }}.tar.gz.sha256
            dist/apple-docs-full-${{ steps.tag.outputs.tag }}.manifest.json
            dist/status.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
