name: Build Snapshots

on:
  schedule:
    - cron: '0 6 * * 0' # Sundays at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: snapshot
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-snapshot:
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      build_macos: ${{ steps.provenance.outputs.build_macos }}
    # Explicitly the newest GA image — GitHub's `macos-latest` label LAGS
    # the newest releases (observed 2026-06-10: macos-latest resolved to
    # macOS 15.7, and the snapshot's recorded buildMacos proved it). The
    # newest image carries the newest CoreGlyphs / CoreGlyphsPrivate
    # bundles so the snapshot ships every SF Symbol macOS has shipped to
    # date, and its Swift toolchain exposes `vectorGlyph.drawInContext:`
    # which our private-API SVG renderer depends on (see src/resources/
    # symbol-pdf-to-svg.js). Catalog names the runner OS cannot draw are
    # flagged render_unsupported and skipped by the completeness gate;
    # anything newer than GA ships via the beta channel
    # (scripts/publish-beta-snapshot.mjs).
    runs-on: macos-26
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

      # Archive pipeline: snapshots ship as `.tar.zst` with `zstd -9 -T3`
      # — ~15% smaller and ~5x faster than the prior `gzip -9`, which
      # itself replaced LZMA2 / .7z after May 2026 corpus growth blew
      # the 3-core M1 runner's wallclock budget (see
      # docs/spikes/archive-format.md). `zstd` ships on macos-26 runners;
      # consumers decompress in-process via Bun, so no host `zstd` is needed.
      - name: Set data directory
        run: echo "APPLE_DOCS_HOME=${{ runner.temp }}/apple-docs" >> "$GITHUB_ENV"

      # Single command refreshes the entire corpus end-to-end:
      # HEAD-check existing pages, crawl new ones, convert, index, sync
      # Apple typography (DMG download + extract) and SF Symbols (public +
      # private), pre-render every symbol to SVG, and run schema migrations
      # / failure cleanup / JSON minify. Idempotent and resumable.
      #
      # APPLE_DOCS_DOWNLOAD_FONTS=1 enables Apple's font DMG download +
      # extraction so the snapshot ships every font Apple distributes,
      # including those not pre-installed on the macos-26 runner. Local
      # `apple-docs sync` runs leave this off — most workstations already
      # have SF Pro / Compact / Mono installed and the DMG fetch is slow.
      # GITHUB_TOKEN authenticates the GitHub-backed sources (swift-evolution,
      # swift-book, wwdc, packages, apple-archive) against api.github.com.
      # Without it `sync` runs unauthenticated — 60 req/hr shared per runner IP —
      # so the `git/trees?recursive=1` discovery for those repos randomly 403s
      # and the source ends up ENTIRELY absent (APPLE_DOCS_HOME is a fresh temp
      # dir each run, so there's no prior corpus to fall back on). The workflow
      # token lifts the limit to 5000 req/hr; public-repo reads need no extra
      # scope beyond the default `contents: read`.
      #
      # APPLE_DOCS_ENRICH_FETCH=1 lets sync's enrichment phase download
      # Xcode's offline Developer Documentation asset (~650 MB, verified)
      # from Apple's CDN — the runner has no Xcode. The phase runs BETWEEN
      # convert and indexing, so USR backfills and novel pages flow through
      # the normal body-index build (no post-hoc FTS repair), and both
      # determinism passes below see the same enriched DB. Non-fatal by
      # design — a stale pin or CDN hiccup logs a warning and ships an
      # un-enriched (but fully functional) snapshot rather than breaking
      # the weekly release.
      - name: Sync corpus (incl. Xcode-docs enrichment)
        env:
          APPLE_DOCS_DOWNLOAD_FONTS: '1'
          APPLE_DOCS_ENRICH_FETCH: '1'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run cli.js sync --full
        timeout-minutes: 120

      - name: Determine tag
        id: tag
        run: echo "tag=snapshot-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Build all archives (full snapshot + combined symbols + per-family
      # fonts + fonts-all). The orchestrator also emits a unified
      # status.json with sha256 + size + url for every artefact.
      #
      # APPLE_DOCS_ALLOW_REMOTE_MODELS=1 lets the model step (run inside
      # build-snapshot.js) fetch the model2vec embedding model once into
      # $APPLE_DOCS_HOME/resources/models so it ships in the snapshot.
      # Vectors themselves do NOT ship — `apple-docs setup` rebuilds them
      # locally (the per-chunk codes would blow GitHub's 2 GiB asset ceiling).
      # The step probe-runs the model and sha256-verifies its files against
      # the supply-chain pins in src/search/model-integrity.js, ABORTING the
      # build on drift. The determinism re-build below intentionally omits
      # the env var — the model is already present locally by then, so the
      # second build reuses it (no re-download) and the archives stay
      # bit-identical. The optional @huggingface/transformers dependency is
      # already installed by the frozen `bun install` (it's in bun.lock).
      - name: Build archives
        env:
          APPLE_DOCS_ALLOW_REMOTE_MODELS: '1'
        run: |
          bun run cli.js status --json > dist-status-base.json
          bun run scripts/build-snapshot.js \
            --out dist/ \
            --tag ${{ steps.tag.outputs.tag }} \
            --status-in dist-status-base.json \
            --status-out dist/status.json \
            --release-url-base https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}

      # Determinism gate: re-build the snapshot archive into a sibling dir
      # and diff sha256s. The orchestrator already wrote the canonical
      # outputs into dist/; we re-run with --out dist-check/ and compare.
      # A mismatch fails the workflow before we publish anything.
      #
      # Runs on every trigger (schedule + workflow_dispatch). Doubles the
      # workflow wallclock (~47 min → ~94 min on a 4-core macos-26
      # runner), but matches the schedule-run guarantees on manual
      # dispatches too — operators who ship a code change to the snapshot
      # pipeline get end-to-end determinism verification before publish
      # instead of waiting for the next Sunday cron.
      - name: Verify determinism
        run: |
          bun run scripts/build-snapshot.js \
            --out dist-check/ \
            --tag ${{ steps.tag.outputs.tag }} \
            --status-out dist-check/status.json \
            >/dev/null
          set -e
          # Compare every .tar.zst by sha256. The .sha256 sidecars themselves
          # are derived from the archive bytes; if archives match, sidecars
          # match by construction.
          fail=0
          for f in dist/*.tar.zst; do
            name=$(basename "$f")
            a=$(shasum -a 256 "$f" | awk '{print $1}')
            b=$(shasum -a 256 "dist-check/$name" | awk '{print $1}')
            if [ "$a" != "$b" ]; then
              echo "MISMATCH $name: $a vs $b" >&2
              fail=1
              # Pinpoint the drift without extracting (disk-safe on the runner):
              # a `tar -tv` listing carries each member's size + mtime + path,
              # so a metadata diff names the offending members directly. zstd is
              # on the runner image; decompress to stdout and list with tar.
              zstd -dc "$f"               | tar -tvf - > /tmp/det-a.lst 2>/dev/null || true
              zstd -dc "dist-check/$name" | tar -tvf - > /tmp/det-b.lst 2>/dev/null || true
              echo "--- first differing members in $name (perms/size/mtime/path) ---" >&2
              diff /tmp/det-a.lst /tmp/det-b.lst | head -40 >&2 || true
            fi
          done
          rm -rf dist-check
          if [ "$fail" != "0" ]; then exit 1; fi

      # Surface the build host's macOS version (recorded by the build as
      # `buildMacos` in status.json) so the release title and the
      # binaries job can carry the snapshot's provenance explicitly —
      # the SF Symbols catalog and fonts are exactly what that macOS
      # provides, so consumers should see it at a glance.
      - name: Read build provenance
        id: provenance
        run: echo "build_macos=$(jq -r '.buildMacos // empty' dist/status.json)" >> "$GITHUB_OUTPUT"

      # Generate the release-notes body via a dedicated script. The
      # previous in-step `bun run --silent <<EOF ... EOF` was a stdin
      # invocation `bun run` does not support; it printed bun's CLI
      # help into release-body.md instead of the rendered markdown.
      - name: Compose release notes
        env:
          RELEASE_PROLOGUE: ${{ github.event_name == 'schedule' && 'Scheduled snapshot build.' || 'Manual snapshot build.' }}
          APPLE_DOCS_STATUS: dist/status.json
        run: |
          bun scripts/render-release-notes.js > dist/release-body.md

      # Release ships only the full snapshot archive + its sidecar + the
      # manifest. The build pipeline still produces the combined fonts
      # archive (`fonts-all-<tag>.tar.zst`) and the symbols archive
      # (`symbols-<tag>.tar.zst`) so a running instance can expose them at
      # runtime, but they are intentionally NOT attached to the release —
      # the full snapshot tarball already contains every resource they
      # bundle, so attaching them would duplicate ~1.5x the bytes for no
      # consumer benefit.
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Snapshot (${{ steps.tag.outputs.tag }}, macOS ${{ steps.provenance.outputs.build_macos }})'
          body_path: dist/release-body.md
          files: |
            dist/apple-docs-full-${{ steps.tag.outputs.tag }}.tar.zst
            dist/apple-docs-full-${{ steps.tag.outputs.tag }}.tar.zst.sha256
            dist/apple-docs-full-${{ steps.tag.outputs.tag }}.manifest.json
            dist/status.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Compiled CLI binaries ride the SAME release as the snapshot. They
  # used to live in a separate `release-binaries.yml` workflow triggered
  # on `release: published` — which NEVER fired for these releases: the
  # create-release step above authenticates with the workflow's
  # GITHUB_TOKEN, and GitHub suppresses events produced by workflow-token
  # actions (recursion guard). Net effect: every scheduled stable
  # snapshot shipped without binaries; only locally-published (PAT)
  # prereleases got them. Building the binaries here closes that gap and
  # also lets us stamp the exact commit into each binary.
  build-binaries:
    needs: build-snapshot
    strategy:
      fail-fast: false
      matrix:
        include:
          # No darwin-x64 leg: onnxruntime (via the optional
          # @huggingface/transformers) ships no darwin/x64 napi binding,
          # so the compile step cannot resolve it for Intel targets.
          - os: macos-latest
            target: bun-darwin-arm64
            name: apple-docs-macos-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            name: apple-docs-linux-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

      # `--define` inlines the short SHA into the binary at the exact
      # expression src/lib/git-version.js reads
      # (`process.env.APPLE_DOCS_COMMIT`), so `apple-docs --version`
      # reports the commit from a standalone binary — no git checkout or
      # runtime env needed.
      - name: Compile binary (commit-stamped)
        run: |
          bun build --compile --minify --sourcemap --target=${{ matrix.target }} \
            --define "process.env.APPLE_DOCS_COMMIT=\"${GITHUB_SHA:0:7}\"" \
            cli.js --outfile ${{ matrix.name }}

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Attach to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.build-snapshot.outputs.tag }}
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Native dylib bundles (libAppleDocsCore) ride the same release:
  # `apple-docs setup --native` fetches the host-matching bundle into
  # dist/native/ (checkout installs only; the kill switch stays off by
  # default). The darwin asset is one universal (arm64+x86_64) dylib — the
  # Swift runtime ships in macOS, so it travels alone; Linux bundles carry
  # the stripped Swift runtime set resolved from ldd with an $ORIGIN rpath.
  build-native:
    needs: build-snapshot
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: darwin-universal
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Swift (swiftly)
        if: runner.os == 'Linux'
        uses: vapor/swiftly-action@bedb227456c5f495afbef80baebee17a8a02cef4 # v0.2.1
        with:
          toolchain: '6.3.2' # keep in sync with swift/.swift-version

      - name: Build, test, stage
        run: |
          set -euo pipefail
          dest="stage/apple-docs-native-${{ matrix.target }}"
          mkdir -p "$dest"
          cd swift
          if [ "${{ runner.os }}" = "Linux" ]; then
            swift build -c release -Xlinker -rpath -Xlinker '$ORIGIN'
            swift test
            cp .build/release/libAppleDocsCore.so "../$dest/"
            for dep in $(ldd "../$dest/libAppleDocsCore.so" | awk '$1 ~ /^lib(swift|Foundation|dispatch|BlocksRuntime|_)/ {print $3}'); do
              cp "$dep" "../$dest/"
            done
            strip --strip-unneeded "../$dest"/*.so
          else
            swift test
            swift build -c release --arch arm64 --arch x86_64
            bin=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
            cp "$bin/libAppleDocsCore.dylib" "../$dest/"
            lipo -info "../$dest/libAppleDocsCore.dylib"
          fi
          cd ..
          ls -lh "$dest"

      - name: Pack + checksum
        run: |
          name="apple-docs-native-${{ matrix.target }}.tar.zst"
          tar -C stage -cf - "apple-docs-native-${{ matrix.target }}" | zstd -9 -q -f -o "$name"
          shasum -a 256 "$name" > "$name.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.build-snapshot.outputs.tag }}
          files: |
            apple-docs-native-${{ matrix.target }}.tar.zst
            apple-docs-native-${{ matrix.target }}.tar.zst.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
