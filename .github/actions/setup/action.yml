name: Setup
description: Install Bun, cache dependencies, and run frozen install. Requires actions/checkout to have run first.

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - name: Cache Bun install artifacts
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.bun/install/cache
        key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-install-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
