codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 2%
    patch:
      default:
        target: 60%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

ignore:
  - "test/**"
  - "src/web/assets/**"
  - "src/web/worker/**"

# Note: src/web/assets/** and src/web/worker/** are browser-only JS that cannot
# be instrumented by bun test coverage. Server-side web code (templates.js,
# serve.js, build.js, search-artifacts.js) IS covered by tests and tracked.
