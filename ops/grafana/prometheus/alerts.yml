# Example Prometheus alert rules for apple-docs. Drop into a file listed
# under `rule_files:` in your prometheus.yml. Tune thresholds to match
# your traffic profile.
#
# Metric names mirror what `apple-docs web serve` and
# `apple-docs mcp serve` emit on their `--metrics-port` listener.
groups:
  - name: apple-docs-web
    rules:
      - alert: WebP95LatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(apple_docs_web_request_latency_ms_bucket{job="apple-docs-web"}[5m]))) > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Web p95 latency >500 ms for 10 min"

      - alert: WebReaderPoolTimeoutBurst
        expr: rate(apple_docs_reader_pool_timeouts_total{job="apple-docs-web"}[1m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reader-pool timeouts firing — DB contention or stuck queries"

      - alert: WebReaderPoolBackpressureBurst
        expr: rate(apple_docs_reader_pool_backpressure_rejects_total{job="apple-docs-web"}[1m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reader-pool backpressure rejecting requests"

      - alert: EventLoopLagHigh
        expr: apple_docs_event_loop_lag_ms{job="apple-docs-web",quantile="0.95"} > 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Web event-loop lag p95 >200 ms"

      - alert: WebRssGrowth
        expr: increase(apple_docs_process_rss_bytes{job="apple-docs-web"}[1h]) > 5e8
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Web RSS grew by >500 MiB in the last hour"

  - name: apple-docs-mcp
    rules:
      - alert: McpHeavyToolQueueSaturated
        expr: apple_docs_heavy_semaphore_waiting{job="apple-docs-mcp"} >= 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "MCP heavy-tool queue ≥60 waiters — clients will start getting 503s"

      - alert: McpHeavyToolRejecting
        expr: rate(apple_docs_heavy_semaphore_rejected_total{job="apple-docs-mcp"}[1m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MCP heavy-tool calls being rejected (queue full)"

      - alert: McpReaderPoolTimeoutBurst
        expr: rate(apple_docs_reader_pool_timeouts_total{job="apple-docs-mcp"}[1m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MCP reader-pool timeouts firing"
