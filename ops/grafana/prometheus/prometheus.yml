# Prometheus scrape config for the local apple-docs stack.
#
# The two jobs target the metrics ports exposed by:
#   apple-docs web serve --metrics-port 9101 --metrics-host 0.0.0.0
#   apple-docs mcp serve --metrics-port 9102 --metrics-host 0.0.0.0
#
# `host.docker.internal` is the host-side gateway from inside Docker on
# macOS / Windows (and is mapped explicitly to host-gateway on Linux via
# docker-compose.yml's extra_hosts).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: apple-docs-web
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9101
        labels:
          surface: web

  - job_name: apple-docs-mcp
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9102
        labels:
          surface: mcp

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
