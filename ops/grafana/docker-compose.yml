# Local Prometheus + Grafana stack for the apple-docs metrics surface.
#
# Usage:
#   1. Start the apple-docs servers locally with metrics enabled:
#        apple-docs web serve   --metrics-port 9101 --metrics-host 0.0.0.0
#        apple-docs mcp serve   --metrics-port 9102 --metrics-host 0.0.0.0
#      (`--metrics-host 0.0.0.0` is required so the container can scrape
#      the host — the default 127.0.0.1 is not reachable from docker.)
#   2. From this directory:
#        docker compose up -d
#   3. Open http://localhost:3000 (Grafana, anonymous editor).
#
# The dashboards `apple-docs · Web` and `apple-docs · MCP` are
# auto-provisioned. The Prometheus datasource is wired against the
# bundled Prometheus instance.

services:
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: apple-docs-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Required so `host.docker.internal` resolves on Linux. macOS /
      # Docker Desktop already define it; harmless duplicate.
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.1
    container_name: apple-docs-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  prometheus-data:
  grafana-data:
