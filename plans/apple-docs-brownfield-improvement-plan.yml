risk_register:
  - id: R-01
    category: regression
    likelihood: high
    impact: high
    description: >
      Fixing templates/CSS/search contracts without precise tests may break existing green flows.
    mitigation:
      - complete P-00 before P-01
      - keep changes small and vertical
    evidence: "[Strong-Moderate][E-05][E-06]"

  - id: R-02
    category: data-migration
    likelihood: medium
    impact: high
    description: >
      Archive key migration can orphan refs, relationships, bookmarks, or search artifacts.
    mitigation:
      - compatibility strategy first
      - migration/backfill tests
      - dry-run on snapshot before release
    evidence: "[Moderate-Strong][E-17][E-35]"

  - id: R-03
    category: scope-creep
    likelihood: high
    impact: medium
    description: >
      Framework hierarchy and navigation cleanup can expand into a generalized IA redesign.
    mitigation:
      - relationship-first navigation only
      - defer code-block linking and broad visual redesign
    evidence: "[Moderate][E-28]"

  - id: R-04
    category: perf-regression
    likelihood: medium
    impact: high
    description: >
      Ranking changes may improve one audited query while regressing symbol precision or specialized sources.
    mitigation:
      - golden relevance set
      - real-corpus benchmarks
      - explicit rollback threshold
    evidence: "[Strong][E-30][E-32]"

  - id: R-05
    category: parity
    likelihood: medium
    impact: medium
    description: >
      Static build and dev server can drift further if hierarchy/search behaviors are fixed in only one path.
    mitigation:
      - parity checklist
      - shared tests for both build and serve
    evidence: "[Moderate-Strong][E-17]"

verification_plan:
  commands:
    - bun run lint:web
    - bun run typecheck
    - bun run test:web
    - bun test test/unit/adapters/apple-archive.test.js
    - bun test test/integration/search.test.js
    - bun test test/golden/search-benchmark.test.js
    - bun scripts/audit-languages.js
  acceptance_checks:
    - name: See Also desktop rendering
      pass_condition: renderable See Also content is visible somewhere intentional on desktop pages with sidebar
    - name: Search-page load more
      pass_condition: second page returns distinct items and total remains accurate
    - name: Archive Ownership page
      pass_condition: the Core Foundation Ownership page is present as its own document and searchable
    - name: Framework TOC stability
      pass_condition: sidebar links remain valid after switching sort mode
    - name: Real-corpus latency
      pass_condition: median and p95 thresholds tracked and met on audited queries
    - name: Relevance audit
      pass_condition: golden query set returns approved top results

definition_of_done:
  - Code reviewed
  - lint and typecheck green
  - Unit, integration, and focused regression tests green
  - Static build and dev server parity checked for affected flows
  - Real-corpus benchmark deltas recorded for search changes
  - No missing renderable section introduced on audited page templates
  - Compatibility strategy documented for any key migration

deferred_items:
