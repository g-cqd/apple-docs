initiative_brief:
  name: Apple Docs Search and Web Navigation Recovery Plan
  existing_system: >
    Bun-based Apple documentation indexer, CLI, MCP server, static web builder,
    and dev server covering Apple DocC, archive content, HIG, WWDC, guidelines,
    Swift evolution, Swift book, packages, and sample code.
  problem_statement: >
    Several reported fixes are incomplete or regressed. Search remains slower and
    less relevant than desired on the real corpus, some page links and archive
    identities are wrong, sidebar and section rendering are inconsistent, some
    display surfaces still leak slugs or internal keys, and the current web branch
    does not pass lint/typecheck cleanly.
  target_users:
    - Web users browsing local rendered Apple documentation
    - CLI users expecting fast and relevant search
    - MCP consumers relying on stable document identity and pagination
    - Maintainers shipping static and dev-server web builds
  desired_outcome: >
    Restore correctness first, then improve relevance, latency, framework landing
    hierarchy, and navigation consistency without regressing unaffected paths.
  constraints:
    - Preserve existing document identity where already correct.
    - Avoid broad rewrites without regression tests.
    - Keep code-block cross-linking out of scope for now, per user direction.
    - Preserve static build and dev-server parity where feasible.
    - Preserve current corpus breadth while fixing archive identity collisions.
  non_goals:
    - Shipping code-block intra-corpus links in this effort.
    - Redesigning the entire visual system from scratch.
    - Replacing Bun, SQLite, or the current storage model wholesale.
  decision_owner: repository maintainer

success_metrics:
  - id: SM-01
    description: Web branch passes lint and typecheck cleanly.
    baseline: false
    target: true
    evidence: "[E-05]"
  - id: SM-02
    description: Search page pagination returns correct subsequent result pages.
    baseline: broken
    target: verified by unit and integration tests
    evidence: "[E-05][E-06]"
  - id: SM-03
    description: No renderable See Also section disappears on desktop pages with sidebars.
    baseline: broken
    target: zero verified regressions
    evidence: "[E-05]"
  - id: SM-04
    description: Apple archive page identity preserves distinct HTML pages under the same guide path.
    baseline: broken
    target: no key collisions for sibling archive HTML pages
    evidence: "[E-17][E-35]"
  - id: SM-05
    description: Common-query real-corpus search latency is reduced and bounded.
    baseline:
      median_ms_range: "130-210"
      p95_worst_ms_observed: 5389.58
    target:
      median_ms: "<=100"
      p95_ms: "<=500"
    evidence: "[E-01][E-32]"
  - id: SM-06
    description: Relevance for audited queries improves.
    baseline:
      examples:
        - query: view
          top_result: devicemanagement/view
        - query: ownership
          top_result: os/osallocatedunfairlock/ownership
        - query: memory management
          top_result: accelerate/memory-management
    target: golden relevance set approved and green
    evidence: "[E-07][E-30]"

context_assessment:
  uncertainty:
    level: medium
    rationale: >
      The code paths are inspectable and many tests exist, but the real-corpus
      behavior diverges from seeded tests and some current changes are incomplete.
    evidence: "[Moderate][E-35]"
  dependency_density:
    level: high
    rationale: >
      Search behavior crosses storage queries, ranking, API contracts, web assets,
      static build artifacts, dev server, and tests. Framework pages additionally
      couple templates, CSS, relationship data, and client-side controls.
    evidence: "[Moderate-Strong][E-17]"
  regulatory_burden:
    level: none
  work_arrival:
    mode: continuous
    rationale: >
      This is an active maintenance stream with new reports and cross-cutting fixes,
      not a one-off greenfield feature.
    evidence: "[Strong][E-25]"

verified_findings:
  - id: F-01
    severity: high
    title: Desktop pages hide See Also in the article without relocating it to the sidebar
    evidence:
      - file: src/web/templates.js
        lines: "393-412"
        note: Only relationships are moved into sidebar content.
      - file: src/web/assets/style.css
        lines: "1030-1033"
        note: Both #relationships and #see-also are hidden in the article on desktop.
    impact: >
      Renderable See Also sections disappear entirely from many pages.
    status: verified

  - id: F-02
    severity: high
    title: Search page pagination contract is wrong
    evidence:
      - file: src/web/assets/search-page.js
        lines: "52-58"
        note: Client always requests limit=50 and uses offset in query string.
      - file: src/web/serve.js
        lines: "78-80"
        note: Server slices results after already limiting the result set.
    impact: >
      Load-more can return empty or incomplete subsequent pages despite total > current count.
    status: verified

  - id: F-03
    severity: high
    title: Search worker asset currently contains a syntax error
    evidence:
      - file: src/web/worker/search-worker.js
        lines: "306-307"
        note: Trailing stray tokens `it)` and `}`.
      - command: bun run lint:web
        note: parse failure
      - command: bun run typecheck
        note: TS1434 / TS1128 on same lines
    impact: >
      Current web branch is not shippable cleanly and search-worker correctness is not trustworthy.
    status: verified

  - id: F-04
    severity: high
    title: Apple archive keys collapse distinct HTML pages into one canonical key
    evidence:
      - file: src/sources/apple-archive.js
        lines: "66-68"
        note: pathToKey strips the terminal html filename.
      - file: src/sources/apple-archive.js
        lines: "291-292"
        note: Discovery dedupes by the collapsed key.
      - reproduction: >
          Simulated library entries for Ownership.html and CreateRule.html both produced
          apple-archive/documentation/CoreFoundation/Conceptual/CFMemoryMgmt/Concepts.
      - local_db: >
          Real local corpus contains apple-archive/documentation/CoreFoundation/Conceptual/CFMemoryMgmt
          titled Introduction, but not Ownership.html as an independently findable page.
    impact: >
      Archived pages such as the requested Core Foundation Ownership page are missing from the corpus.
    status: verified

  - id: F-05
    severity: medium
    title: General search still waits on deep body search in CLI and search-page flows
    evidence:
      - file: src/commands/search.js
        lines: "126-131"
        note: FTS, trigram, and body searches are awaited together via Promise.all.
      - file: src/web/assets/search.js
        lines: "97-100"
        note: Header dropdown masks issue by forcing no_deep=1.
    impact: >
      "Fast-first" behavior is only partially achieved; search page and CLI still wait for body work.
    status: verified

  - id: F-06
    severity: medium
    title: Real-corpus search relevance remains poor for common generic queries
    evidence:
      - benchmark:
          - query: view
            top_result: devicemanagement/view
          - query: ownership
            top_result: os/osallocatedunfairlock/ownership
          - query: memory management
            top_result: accelerate/memory-management
      - command: >
          local-corpus queries showed medians around 130-210ms and relevance misses on generic terms.
    impact: >
      Search ranking still over-indexes on literal matches or shallow heuristics rather than user intent.
    status: verified

  - id: F-07
    severity: medium
    title: Framework hierarchy work is only partially wired and breaks TOC consistency
    evidence:
      - file: src/web/build.js
        lines: "102-107"
        note: Static build passes treeEdges.
      - file: src/web/serve.js
        lines: "200-209"
        note: Dev server framework rendering does not pass treeEdges.
      - file: src/web/assets/collection-filters.js
        lines: "160-212"
        note: Client-side sort rewrites sections and ids.
      - file: src/web/templates.js
        lines: "612-617"
        note: TOC is built once from original groups and not regenerated after sort regrouping.
      - file: src/web/assets/tree-view.js
        lines: "154-178"
        note: display-title override is computed but ignored by renderNode signature.
    impact: >
      Framework landing pages remain messy, tree mode is inconsistent between static and dev flows,
      and sidebar links can point at stale sections after client-side regrouping.
    status: verified

  - id: F-08
    severity: medium
    title: Search status/live-region wiring is inconsistent
    evidence:
      - file: src/web/templates.js
        lines: "113-115"
        note: Search page declares visible search-status container.
      - file: src/web/templates.js
        lines: "162-165"
        note: Header also declares a second element with the same id.
      - file: src/web/assets/search-page.js
        lines: "1-7"
        note: Script selects by id and may bind to the wrong node.
    impact: >
      Search progress messaging can target the wrong element and reduces accessible clarity.
    status: verified

  - id: F-09
    severity: low
    title: Title/display-name cleanup is partially improved but not complete
    evidence:
      - file: src/web/templates.js
        lines: "230-238"
        note: Framework badges now prefer framework_display.
      - file: src/web/templates.js
        lines: "197-224"
        note: Breadcrumbs use title/framework labels.
      - note: >
          Some framework and tree/list surfaces still derive grouping or fallback labels from role or key.
    impact: >
      Slug leakage is reduced but not eliminated in all secondary navigation surfaces.
    status: partially-fixed

  - id: F-10
    severity: low
    title: Syntax highlighting is implemented and broadly useful, but language coverage has outliers
    evidence:
      - file: src/content/highlight.js
        lines: "1-39"
        note: Shiki integration plus corpus language alias mapping.
      - audit: >
          scripts/audit-languages.js found the dominant languages are covered, but rare labels
          like other, text, not specified, kotlin, rust, go, java, ruby, mermaid, dockerfile,
          and malformed fenced markers remain unmapped.
    impact: >
      Syntax highlighting is a real improvement, but fallback experience should be normalized further.
    status: materially-fixed

