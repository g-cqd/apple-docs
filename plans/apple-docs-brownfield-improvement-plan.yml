methodology_selection:
  primary_approach:
    name: hybrid-cadence-plus-flow
    rationale: >
      Use a short planning cadence to coordinate risky multi-area changes, but execute
      through small pull-based vertical slices with strict WIP limits.
    evidence: "[Strong][E-01][E-25]"
  planning_horizon:
    cadence: 1 week planning / daily integration
    execution_model: kanban within milestone
    merge_policy: trunk-based or short-lived topic branches only
    evidence: "[Strong-Moderate][E-04][E-06]"
  anti_patterns_to_avoid:
    - id: AP-01
      description: Fixing everything in one cross-cutting branch without regression gates.
    - id: AP-05
      description: Late integration between static build, dev server, and CLI search.
    - id: AP-07
      description: Allowing framework-hierarchy work to expand into a full IA rewrite.
    - id: AP-08
      description: Treating search latency targets as promises without real-corpus tracking.

strategy:
  ordering_principles:
    - Correctness before optimization. "[Strong][E-05]"
    - Stabilize API and rendering contracts before broader UX work. "[Moderate-Strong][E-17]"
    - Deliver in vertical slices with test coverage. "[Moderate-Promising][E-13]"
    - Use feature flags or isolated toggles for risky search-path changes. "[Promising][E-19]"
  scope_guardrails:
    - Do not ship hierarchy/tree changes until list, TOC, and deep links are consistent in both static and dev modes.
    - Do not tune ranking heuristics without a golden relevance set derived from real bad queries.
    - Do not migrate archive keys without a backfill and compatibility strategy.
    - Keep code-block intra-corpus linking explicitly deferred.

roadmap:
  - id: P-00
    name: Study and Safety Net
    status: proposed
    duration: 2-3 days
    gate: critical regressions reproducible and covered by tests
    goal: >
      Freeze the current failure modes into automated tests so subsequent fixes are measurable.
    deliverables:
      - Regression tests for See Also preservation
      - Regression tests for search-page offset/load-more behavior
      - Regression tests for duplicate search-status ids or visible status targeting
      - Archive fixture reproducing sibling HTML page key collisions
      - Tree/list TOC consistency tests after sort regrouping
    evidence: "[Strong-Moderate][E-05][E-06]"

  - id: P-01
    name: Correctness Recovery
    status: proposed
    duration: 2-4 days
    gate: branch passes lint, typecheck, and new regression suite
    goal: >
      Repair the current concrete breakages without broad behavioral expansion.
    deliverables:
      - Search-worker parse issue removed
      - Search page status targeting fixed
      - See Also rendering restored
      - Search pagination/offset contract corrected
      - Sidebar/article duplication rules made explicit and correct
    evidence: "[Strong][E-05]"

  - id: P-02
    name: Archive Identity Repair
    status: proposed
    duration: 3-5 days
    gate: archive corpus contains distinct sibling HTML pages and migration is validated
    goal: >
      Fix archive keying so individual HTML pages remain individually addressable and searchable.
    deliverables:
      - New archive key strategy for html/htm pages
      - Backfill or migration path for existing archive rows
      - Search and browse compatibility strategy for old collapsed keys
      - Verified ingestion of Core Foundation Ownership page
    evidence: "[Moderate-Strong][E-17][E-35]"

  - id: P-03
    name: Search Fast-First Delivery and Relevance
    status: proposed
    duration: 4-7 days
    gate: real-corpus latency and golden relevance set meet target thresholds
    goal: >
      Return fast title/path results immediately, bound deep-search cost, and improve generic-query ranking.
    deliverables:
      - Fast-tier and deep-tier search split
      - Progressive or deferred deep search for web search page
      - CLI behavior clarified and optimized
      - Real-corpus benchmark harness and thresholds
      - Relevance golden set for audited bad queries
    evidence: "[Strong][E-01][E-02][E-32]"

  - id: P-04
    name: Framework Navigation and Hierarchy
    status: proposed
    duration: 5-8 days
    gate: framework landing pages are consistent in static and dev modes
    goal: >
      Replace messy flat framework landings with a consistent relationship-aware hierarchy
      while preserving deep links, TOC integrity, and filter behavior.
    deliverables:
      - Tree edges wired in dev server as well as static build
      - Relationship-first grouping model
      - Stable TOC regeneration or stable ids under regrouping
      - Tree/list parity for filters, deprecated toggle, and quick search
      - Clear overload disambiguation in tree view
    evidence: "[Moderate][E-13][E-17]"

  - id: P-05
    name: Accessibility, UX, and Hardening
    status: proposed
    duration: 2-4 days
    gate: accessibility and regression checklist passes
    goal: >
      Finish the remaining UI, live-region, and sidebar consistency issues after core behavior is correct.
    deliverables:
      - Unified loading/progress messaging
      - Verified keyboard navigation and announcements
      - Sidebar overlap/duplication audit closed
      - Language-normalization improvements for code highlighting fallbacks
      - CI gates updated for ongoing enforcement
    evidence: "[Strong][E-05][E-30][E-32]"

decomposition:
  epics:
    - id: EP-01
      name: Web correctness recovery
      outcome: eliminate currently verified regressions on rendered pages and search UI
    - id: EP-02
      name: Archive corpus identity repair
      outcome: ensure archived Apple pages are individually addressable and searchable
    - id: EP-03
      name: Search speed and ranking
      outcome: faster, more relevant search for web and CLI on the real corpus
    - id: EP-04
      name: Framework landing hierarchy
      outcome: navigable, relationship-aware framework root pages with consistent deep links

  tasks:
    - id: T-001
      phase: P-00
      subject: Add regression coverage for missing See Also sections
      description: >
        Add template/render tests that fail when a renderable See Also section is hidden
        from the article without equivalent sidebar rendering.
      verify:
        - New test fails on current behavior and passes on fix
      depends_on: []
      status: proposed

    - id: T-002
      phase: P-00
      subject: Add regression coverage for search-page offset semantics
      description: >
        Add server and client tests verifying that offset applies to the full result set,
        not to a pre-limited first page.
      verify:
        - Load-more returns distinct second page
      depends_on: []
      status: proposed

    - id: T-003
      phase: P-00
      subject: Add regression coverage for search-status targeting
      description: >
        Ensure search-page scripts update the visible search status region and that ids
        are unique across page templates.
      verify:
        - Unique-id assertions pass
        - Search-page status updates visible region in tests
      depends_on: []
      status: proposed

    - id: T-004
      phase: P-00
      subject: Add archive fixture for sibling html page collisions
      description: >
        Extend apple-archive adapter tests with a fixture containing multiple HTML pages
        under the same guide path to prove current key collapse and prevent regressions.
      verify:
        - Fixture reproduces Ownership/CreateRule collision before fix
      depends_on: []
      status: proposed

    - id: T-005
      phase: P-00
      subject: Add TOC consistency regression for framework regrouping
      description: >
        Capture the current broken behavior where client-side regrouping changes section ids
        without re-synchronizing the sidebar TOC.
      verify:
        - Test fails on current regrouping strategy
      depends_on: []
      status: proposed

    - id: T-101
      phase: P-01
      subject: Remove search-worker syntax error and gate asset parsing in CI
      description: >
        Fix the invalid trailing tokens in search-worker.js and ensure lint/typecheck
        cover worker assets reliably.
      verify:
        - bun run lint:web passes
        - bun run typecheck passes
      depends_on: [T-001, T-002, T-003]
      status: proposed

    - id: T-102
      phase: P-01
      subject: Restore See Also rendering invariants
      description: >
        Choose one invariant and apply it consistently:
        either keep See Also in the article, or move it into the sidebar and stop hiding it
        unless it is actually rendered there.
      verify:
        - Rendered page contains See Also content on desktop and mobile
      depends_on: [T-001]
      status: proposed

    - id: T-103
      phase: P-01
      subject: Fix search-page status/live-region wiring
      description: >
        Remove duplicate ids, use separate visible and screen-reader regions where needed,
        and make search-page scripts target the correct node.
      verify:
        - Unique DOM ids
        - Status text visible on search page during active searches
      depends_on: [T-003]
      status: proposed

    - id: T-104
      phase: P-01
      subject: Correct API offset semantics
      description: >
        Move pagination semantics into the search query path or query layer so offset
        applies before final truncation and total remains accurate.
      verify:
        - Load-more and offset tests pass
        - Search page returns distinct second-page results
      depends_on: [T-002]
      status: proposed

    - id: T-105
      phase: P-01
      subject: Normalize sidebar/article duplication rules
      description: >
        Define when relationships and See Also belong in the sidebar, the article,
        or both, and encode that policy in templates and CSS.
      verify:
        - No duplicated sidebar/article relationship block where policy forbids it
        - No missing renderable section where policy allows it
      depends_on: [T-001]
      status: proposed

    - id: T-201
      phase: P-02
      subject: Redesign archive html key derivation
      description: >
        Preserve terminal html/htm page identity for archive pages instead of collapsing
        them to the containing directory key.
      verify:
        - Ownership and CreateRule produce distinct keys
      depends_on: [T-004]
      status: proposed

    - id: T-202
      phase: P-02
      subject: Define compatibility strategy for existing archive keys
      description: >
        Decide whether old collapsed keys redirect, alias to intro pages, or remain as
        synthetic guide containers while new page keys coexist.
      verify:
        - Compatibility rules documented and covered by tests
      depends_on: [T-201]
      status: proposed

    - id: T-203
      phase: P-02
      subject: Implement archive key migration and backfill
      description: >
        Backfill or rebuild affected archive entries and relationships, preserving
        searchability and browse behavior for migrated documents.
      verify:
        - Local corpus includes requested Ownership page
        - Search returns it by title and URL-derived identity
      depends_on: [T-202]
      status: proposed

    - id: T-204
      phase: P-02
      subject: Add real archive acceptance checks
      description: >
        Add focused tests and corpus checks for known archive pages that previously collapsed.
      verify:
        - Acceptance checks green in CI
      depends_on: [T-203]
      status: proposed

    - id: T-301
      phase: P-03
      subject: Split fast-tier and deep-tier search execution
      description: >
        Return FTS/trigram/fuzzy results without waiting for body search, and fold deep
        results in later only when requested by the caller or UI flow.
      verify:
        - Search latency improves on real-corpus benchmark
        - Fast-tier results remain relevant
      depends_on: [T-101, T-104]
      status: proposed

    - id: T-302
      phase: P-03
      subject: Define distinct web and CLI deep-search policies
      description: >
        Make header dropdown, search page, and CLI explicit about when body search is used,
        whether it is progressive, and how cancellation works.
      verify:
        - Policies documented
        - Tests cover each entry point
      depends_on: [T-301]
      status: proposed

    - id: T-303
      phase: P-03
      subject: Add real-corpus benchmark harness and thresholds
      description: >
        Extend benchmark coverage beyond seeded in-memory data to representative local or fixture corpus data.
      verify:
        - Baseline and target metrics tracked over time
      depends_on: [T-301]
      status: proposed

    - id: T-304
      phase: P-03
      subject: Build audited relevance golden set
      description: >
        Capture bad queries from the audit and expected top-ranked outcomes, then use them
        to tune ranking and source priors safely.
      verify:
        - Golden relevance set approved and green
      depends_on: [T-301]
      status: proposed

    - id: T-305
      phase: P-03
      subject: Tune ranking with explicit source and intent tradeoffs
      description: >
        Adjust ranking heuristics only after the golden set exists, especially for generic,
        archive, concept, and symbol-intent queries.
      verify:
        - Query set improves without new regressions
      depends_on: [T-304]
      status: proposed

    - id: T-401
      phase: P-04
      subject: Wire framework tree data into dev server
      description: >
        Make dev-server framework pages receive the same tree edges already provided by static build.
      verify:
        - Static and dev pages expose equivalent hierarchy data
      depends_on: [T-101]
      status: proposed

    - id: T-402
      phase: P-04
      subject: Shift framework landing organization from role-first to relationship-first
      description: >
        Use parent-child document relationships as the primary hierarchy and kind/role as secondary metadata.
      verify:
        - Framework pages clearly group descendants under owners
      depends_on: [T-401, T-203]
      status: proposed

    - id: T-403
      phase: P-04
      subject: Make TOC ids stable under regrouping
      description: >
        Either stop client-side id rewrites or regenerate the TOC from the same post-sort structure.
      verify:
        - Sidebar links remain valid after changing sort mode
      depends_on: [T-005, T-401]
      status: proposed

    - id: T-404
      phase: P-04
      subject: Fix tree-view overload disambiguation
      description: >
        Actually render computed display-title overrides and ensure duplicates are distinguishable.
      verify:
        - Duplicate child titles are visually disambiguated in tree mode
      depends_on: [T-401]
      status: proposed

    - id: T-405
      phase: P-04
      subject: Unify filters and quick search across list and tree modes
      description: >
        Avoid one mode honoring filters while the other ignores them or partially applies them.
      verify:
        - Deprecated, quick search, and kind filters behave the same in both modes
      depends_on: [T-402, T-403, T-404]
      status: proposed

    - id: T-406
      phase: P-04
      subject: Reassess section naming and display-name fallbacks
      description: >
        Finish replacing slug/key fallbacks on framework pages and tree nodes where a display title exists.
      verify:
        - No avoidable slug leakage in framework navigation surfaces
      depends_on: [T-402]
      status: proposed

    - id: T-501
      phase: P-05
      subject: Normalize loading and status affordances across header search and search page
      description: >
        Align visible progress indicators, ARIA announcements, and empty/error states across both search surfaces.
      verify:
        - UX audit checklist green
      depends_on: [T-103, T-302]
      status: proposed

    - id: T-502
      phase: P-05
      subject: Expand syntax-highlighting fallback normalization
      description: >
        Normalize rare or malformed language markers to stable fallback buckets so highlighting fails gracefully.
      verify:
        - Corpus language audit has no avoidable unmapped common labels
      depends_on: []
      status: proposed

    - id: T-503
      phase: P-05
      subject: Harden CI and release gates
      description: >
        Promote lint/typecheck, focused web tests, archive identity tests, and selected benchmark/relevance checks into CI.
      verify:
        - CI fails on previously observed regressions
      depends_on: [T-101, T-204, T-303, T-304]
      status: proposed

