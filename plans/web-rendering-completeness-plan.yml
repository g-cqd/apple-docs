# ─────────────────────────────────────────────────────────────────────────────
# Problem Statement
# ─────────────────────────────────────────────────────────────────────────────

problem_statement: >
  The web renderer only handles 3 of 7+ Apple DocC primaryContentSections kinds
  (declarations, parameters, content). Entire section types — properties, REST
  endpoint URLs, REST parameters, REST response codes, possible values — are
  silently dropped during normalization, so they never reach the database or
  rendered pages. Additionally, the tree view is completely non-functional due
  to a JSON escaping bug, and page metadata (platform availability, beta,
  deprecated) is stored but never displayed.

# ─────────────────────────────────────────────────────────────────────────────
# Evidence from Screenshot Comparison
# ─────────────────────────────────────────────────────────────────────────────

screenshot_findings:
  - id: SF-01
    page: AppTransactionInfoResponse (Object)
    apple_shows:
      - Properties section with signedAppTransactionInfo, type JWSAppTransaction, description
      - Platform availability badge "App Store Server API 1.17+"
      - Mentioned in section
    apple_docs_missing:
      - Properties section entirely absent
      - Platform availability badge absent
      - Mentioned in section absent

  - id: SF-02
    page: Get All Subscription Statuses (REST Endpoint)
    apple_shows:
      - URL section with endpoint path
      - Sandbox URL section
      - Path Parameters with (Required) badge and type info
      - Query Parameters with type and description
      - Response Codes (200, 400, 401, 404, 429, 500) with status text and content type
      - Mentioned in section
    apple_docs_missing:
      - URL and Sandbox URL sections entirely absent
      - Path Parameters absent (different from function parameters)
      - Query Parameters absent
      - Response Codes section entirely absent
      - Mentioned in section absent

  - id: SF-03
    page: Information Property List / Entitlements
    apple_shows:
      - Details section (Type/Value)
      - Mentioned in section
      - Rich Topics with many subcategories
      - Type Aliases section
      - Property Lists section
    apple_docs_missing:
      - Details metadata absent
      - Some topic subcategories may be flattened

  - id: SF-04
    page: Tree sidebar (Account Data Transfer)
    apple_shows:
      - Expandable tree with grouped items (Request creation, Status, Downloads, Cancellation)
      - Type badges (object, endpoint icons)
    apple_docs_missing:
      - Tree view completely non-functional (JSON parse failure)

# ─────────────────────────────────────────────────────────────────────────────
# Root Causes
# ─────────────────────────────────────────────────────────────────────────────

root_causes:
  - id: RC-01
    title: Tree JSON double-escaped
    file: src/web/templates.js
    line: 638
    detail: >
      escapeAttr() applied to JSON inside <script type="application/json">,
      converting " to &quot; which breaks JSON.parse() in tree-view.js.
      Silent try/catch means zero visible error.

  - id: RC-02
    title: Normalizer drops unknown primaryContentSections kinds
    file: src/content/normalize.js
    lines: 122-169
    detail: >
      Only 'declarations', 'parameters', and 'content' kinds are extracted.
      Apple DocC also sends: 'properties', 'restParameters', 'restBody',
      'restResponses', 'possibleValues', 'mentions'. All silently dropped.

  - id: RC-03
    title: Renderer has no handlers for missing section types
    file: src/content/render-html.js
    lines: 45-62
    detail: >
      renderSectionHtml switch only handles: abstract, declaration, parameters,
      discussion, topics, relationships, see_also. Even if new sections were
      stored, they'd fall through to the discussion fallback.

  - id: RC-04
    title: Platform metadata not rendered
    file: src/web/templates.js
    lines: 230-241
    detail: >
      buildDocMeta() only renders framework and role_heading badges.
      platforms_json, is_deprecated, is_beta are in the DB but not displayed.

# ─────────────────────────────────────────────────────────────────────────────
# Affected Files
# ─────────────────────────────────────────────────────────────────────────────

affected_files:
  normalize: src/content/normalize.js
  render_html: src/content/render-html.js
  templates: src/web/templates.js
  style: src/web/assets/style.css
  tree_view: src/web/assets/tree-view.js
  serve: src/web/serve.js
  build: src/web/build.js
  database: src/storage/database.js
  tests:
    - test/unit/normalize.test.js
    - test/unit/renderers.test.js
    - test/unit/web-templates.test.js

